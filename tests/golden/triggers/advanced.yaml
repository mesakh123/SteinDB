- name: ddl_trigger_removed
  category: triggers
  oracle: |
    CREATE OR REPLACE TRIGGER trg_ddl_audit
    AFTER DDL ON SCHEMA
    BEGIN
      INSERT INTO ddl_log (event, object_name, ts)
      VALUES (ORA_SYSEVENT, ORA_DICT_OBJ_NAME, SYSDATE);
    END;
  expected_postgresql: |
    -- WARNING: DDL triggers via Oracle AFTER DDL ON SCHEMA have no direct PostgreSQL equivalent.
    -- Use event triggers: CREATE EVENT TRIGGER for ddl_command_start / ddl_command_end.
    CREATE OR REPLACE FUNCTION trg_ddl_audit_func() RETURNS event_trigger AS $$
    BEGIN
      INSERT INTO ddl_log (event, object_name, ts)
      VALUES (TG_EVENT, TG_TAG, CURRENT_TIMESTAMP);
    END;
    $$ LANGUAGE plpgsql;
    CREATE EVENT TRIGGER trg_ddl_audit ON ddl_command_end EXECUTE FUNCTION trg_ddl_audit_func();
  complexity: 6
  constructs: ["TRIGGER", "DDL TRIGGER", "EVENT TRIGGER"]
  tags: ["manual_review"]

- name: trigger_inserting_updating_deleting
  category: triggers
  oracle: |
    CREATE OR REPLACE TRIGGER trg_emp_dml
    BEFORE INSERT OR UPDATE OR DELETE ON employees
    FOR EACH ROW
    BEGIN
      IF INSERTING THEN
        :NEW.created_at := SYSDATE;
      ELSIF UPDATING THEN
        :NEW.updated_at := SYSDATE;
      ELSIF DELETING THEN
        INSERT INTO deleted_employees (id, name) VALUES (:OLD.id, :OLD.name);
      END IF;
    END;
  expected_postgresql: |
    CREATE OR REPLACE FUNCTION trg_emp_dml_func() RETURNS TRIGGER AS $$
    BEGIN
      IF TG_OP = 'INSERT' THEN
        NEW.created_at := CURRENT_TIMESTAMP;
        RETURN NEW;
      ELSIF TG_OP = 'UPDATE' THEN
        NEW.updated_at := CURRENT_TIMESTAMP;
        RETURN NEW;
      ELSIF TG_OP = 'DELETE' THEN
        INSERT INTO deleted_employees (id, name) VALUES (OLD.id, OLD.name);
        RETURN OLD;
      END IF;
      RETURN NULL;
    END;
    $$ LANGUAGE plpgsql;
    CREATE TRIGGER trg_emp_dml BEFORE INSERT OR UPDATE OR DELETE ON employees FOR EACH ROW EXECUTE FUNCTION trg_emp_dml_func();
  complexity: 6
  constructs: ["TRIGGER", "INSERTING", "UPDATING", "DELETING", "TG_OP"]

- name: trigger_autonomous_transaction
  category: triggers
  oracle: |
    CREATE OR REPLACE TRIGGER trg_error_log
    AFTER INSERT ON error_events
    FOR EACH ROW
    DECLARE
      PRAGMA AUTONOMOUS_TRANSACTION;
    BEGIN
      INSERT INTO error_log (event_id, logged_at) VALUES (:NEW.id, SYSDATE);
      COMMIT;
    END;
  expected_postgresql: |
    -- WARNING: PRAGMA AUTONOMOUS_TRANSACTION has no direct PostgreSQL equivalent.
    -- Use dblink or pg_background to simulate autonomous transactions.
    CREATE OR REPLACE FUNCTION trg_error_log_func() RETURNS TRIGGER AS $$
    BEGIN
      PERFORM dblink_exec('dbname=' || current_database(),
        'INSERT INTO error_log (event_id, logged_at) VALUES (' || NEW.id || ', CURRENT_TIMESTAMP)');
      RETURN NULL;
    END;
    $$ LANGUAGE plpgsql;
    CREATE TRIGGER trg_error_log AFTER INSERT ON error_events FOR EACH ROW EXECUTE FUNCTION trg_error_log_func();
  complexity: 8
  constructs: ["TRIGGER", "AUTONOMOUS_TRANSACTION", "PRAGMA"]
  tags: ["manual_review"]
