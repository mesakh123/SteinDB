  category: ddl
  oracle: "CREATE TABLE archive (id NUMBER(10), data CLOB) COMPRESS FOR OLTP"
  expected_postgresql: "CREATE TABLE archive (id INTEGER, data TEXT)"
  constructs: ["CREATE TABLE", "COMPRESS"]
  tags: ["physical_removal"]

- name: create_table_nocompress
  category: ddl
  oracle: "CREATE TABLE live_data (id NUMBER(10), val NUMBER) NOCOMPRESS"
  expected_postgresql: "CREATE TABLE live_data (id INTEGER, val NUMERIC)"
  constructs: ["CREATE TABLE", "NOCOMPRESS"]
  tags: ["physical_removal"]

- name: create_table_noparallel
  category: ddl
  oracle: "CREATE TABLE small_table (id NUMBER(10)) NOPARALLEL"
  expected_postgresql: "CREATE TABLE small_table (id INTEGER)"
  constructs: ["CREATE TABLE", "NOPARALLEL"]
  tags: ["physical_removal"]

- name: create_table_cache_nocache
  category: ddl
  oracle: "CREATE TABLE ref_data (id NUMBER(10), label VARCHAR2(50)) CACHE"
  expected_postgresql: "CREATE TABLE ref_data (id INTEGER, label VARCHAR(50))"
  constructs: ["CREATE TABLE", "CACHE"]
  tags: ["physical_removal"]

- name: create_unique_index_tablespace
  category: ddl
  oracle: "CREATE UNIQUE INDEX uk_emp_email ON employees (email) TABLESPACE idx_ts PARALLEL 2"
  expected_postgresql: "CREATE UNIQUE INDEX uk_emp_email ON employees (email)"
  constructs: ["CREATE UNIQUE INDEX", "TABLESPACE", "PARALLEL"]
  tags: ["tablespace_removal", "physical_removal"]

- name: create_table_storage_complex
  category: ddl
  oracle: |
    CREATE TABLE financial.transactions (
      id NUMBER(18) NOT NULL,
      amount NUMBER(15,2),
      description VARCHAR2(500)
    ) TABLESPACE fin_data
      STORAGE (INITIAL 1M NEXT 1M MAXEXTENTS UNLIMITED PCTINCREASE 0 FREELISTS 4)
      PCTFREE 20 PCTUSED 60 INITRANS 4 MAXTRANS 255
      NOLOGGING NOPARALLEL
  expected_postgresql: |
    CREATE TABLE financial.transactions (
      id BIGINT NOT NULL,
      amount NUMERIC(15,2),
      description VARCHAR(500)
    )
  complexity: 3
  constructs: ["CREATE TABLE", "TABLESPACE", "STORAGE", "PCTFREE", "PCTUSED", "INITRANS", "MAXTRANS", "NOLOGGING", "NOPARALLEL"]
  tags: ["physical_removal", "combined"]
