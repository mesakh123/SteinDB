# =============================================================================
# SteinDB Golden Tests — DDL Tablespace & Oracle Physical Clause Removal
# Oracle-specific storage/tablespace/physical clauses must be stripped
# =============================================================================

- name: create_table_tablespace
  category: ddl
  oracle: "CREATE TABLE hr.employees (id NUMBER(10), name VARCHAR2(100)) TABLESPACE users"
  expected_postgresql: "CREATE TABLE hr.employees (id INTEGER, name VARCHAR(100))"
  constructs: ["CREATE TABLE", "TABLESPACE"]
  tags: ["tablespace_removal"]

- name: create_index_tablespace
  category: ddl
  oracle: "CREATE INDEX idx_emp_name ON hr.employees (name) TABLESPACE idx_ts"
  expected_postgresql: "CREATE INDEX idx_emp_name ON hr.employees (name)"
  constructs: ["CREATE INDEX", "TABLESPACE"]
  tags: ["tablespace_removal"]

- name: create_table_storage
  category: ddl
  oracle: "CREATE TABLE orders (id NUMBER(10), total NUMBER(10,2)) STORAGE (INITIAL 64K NEXT 64K PCTINCREASE 0)"
  expected_postgresql: "CREATE TABLE orders (id INTEGER, total NUMERIC(10,2))"
  constructs: ["CREATE TABLE", "STORAGE"]
  tags: ["storage_removal"]

- name: create_table_pctfree_pctused
  category: ddl
  oracle: "CREATE TABLE products (id NUMBER(10), name VARCHAR2(200)) PCTFREE 10 PCTUSED 40"
  expected_postgresql: "CREATE TABLE products (id INTEGER, name VARCHAR(200))"
  constructs: ["CREATE TABLE", "PCTFREE", "PCTUSED"]
  tags: ["physical_removal"]

- name: create_table_logging
  category: ddl
  oracle: "CREATE TABLE audit_trail (id NUMBER(10), action VARCHAR2(50)) LOGGING"
  expected_postgresql: "CREATE TABLE audit_trail (id INTEGER, action VARCHAR(50))"
  constructs: ["CREATE TABLE", "LOGGING"]
  tags: ["physical_removal"]

- name: create_table_nologging
  category: ddl
  oracle: "CREATE TABLE temp_data (id NUMBER(10), payload CLOB) NOLOGGING"
  expected_postgresql: "CREATE TABLE temp_data (id INTEGER, payload TEXT)"
  constructs: ["CREATE TABLE", "NOLOGGING"]
  tags: ["physical_removal"]

- name: create_table_parallel
  category: ddl
  oracle: "CREATE TABLE big_table (id NUMBER(10), data VARCHAR2(4000)) PARALLEL 4"
  expected_postgresql: "CREATE TABLE big_table (id INTEGER, data VARCHAR(4000))"
  constructs: ["CREATE TABLE", "PARALLEL"]
  tags: ["physical_removal"]

- name: create_table_all_oracle_clauses
  category: ddl
  oracle: |
    CREATE TABLE hr.employees (
      id NUMBER(10) NOT NULL,
      name VARCHAR2(100),
      salary NUMBER(10,2)
    ) TABLESPACE users
      PCTFREE 10 PCTUSED 40 INITRANS 1
      STORAGE (INITIAL 64K NEXT 64K PCTINCREASE 0)
      LOGGING
      PARALLEL 4
  expected_postgresql: |
    CREATE TABLE hr.employees (
      id INTEGER NOT NULL,
      name VARCHAR(100),
      salary NUMERIC(10,2)
    )
  complexity: 3
  constructs: ["CREATE TABLE", "TABLESPACE", "PCTFREE", "PCTUSED", "INITRANS", "STORAGE", "LOGGING", "PARALLEL"]
  tags: ["physical_removal", "combined"]

- name: alter_table_move_tablespace
  category: ddl
  oracle: "ALTER TABLE hr.employees MOVE TABLESPACE new_ts"
  expected_postgresql: "-- ALTER TABLE MOVE TABLESPACE removed (no PostgreSQL equivalent)"
  constructs: ["ALTER TABLE", "MOVE TABLESPACE"]
  tags: ["tablespace_removal"]

- name: create_index_storage
  category: ddl
  oracle: "CREATE INDEX idx_orders_date ON orders (order_date) STORAGE (INITIAL 64K NEXT 64K) TABLESPACE idx_ts"
  expected_postgresql: "CREATE INDEX idx_orders_date ON orders (order_date)"
  constructs: ["CREATE INDEX", "STORAGE", "TABLESPACE"]
  tags: ["storage_removal", "tablespace_removal"]

- name: create_table_initrans_maxtrans
  category: ddl
  oracle: "CREATE TABLE sessions (id NUMBER(10), token VARCHAR2(256)) INITRANS 2 MAXTRANS 255"
  expected_postgresql: "CREATE TABLE sessions (id INTEGER, token VARCHAR(256))"
  constructs: ["CREATE TABLE", "INITRANS", "MAXTRANS"]
  tags: ["physical_removal"]

