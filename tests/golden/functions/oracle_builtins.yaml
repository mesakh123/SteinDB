# =============================================================================
# SteinDB Golden Tests — Oracle Built-in Functions (O2P)
# Missing built-in function mappings identified by external reviewers
# =============================================================================

# ---------------------------------------------------------------------------
# DBMS_LOB functions
# ---------------------------------------------------------------------------

- name: dbms_lob_getlength
  category: functions
  oracle: "SELECT DBMS_LOB.GETLENGTH(document) FROM files WHERE id = 1"
  expected_postgresql: "SELECT OCTET_LENGTH(document) FROM files WHERE id = 1"
  complexity: 3
  constructs: ["DBMS_LOB"]
  tags: ["lob", "reviewer_gap"]
  acceptance_criteria:
    - "DBMS_LOB.GETLENGTH maps to OCTET_LENGTH for BYTEA, LENGTH for TEXT"

- name: dbms_lob_substr
  category: functions
  oracle: "SELECT DBMS_LOB.SUBSTR(content, 100, 1) FROM documents"
  expected_postgresql: "SELECT SUBSTRING(content FROM 1 FOR 100) FROM documents"
  complexity: 3
  constructs: ["DBMS_LOB"]
  tags: ["lob", "reviewer_gap"]
  acceptance_criteria:
    - "DBMS_LOB.SUBSTR(lob, amount, offset) maps to SUBSTRING(col FROM offset FOR amount)"
    - "Note parameter order difference: Oracle is (lob, amount, offset)"

# ---------------------------------------------------------------------------
# UTL_RAW
# ---------------------------------------------------------------------------

- name: utl_raw_cast_to_varchar2
  category: functions
  oracle: "SELECT UTL_RAW.CAST_TO_VARCHAR2(raw_col) FROM raw_data"
  expected_postgresql: "SELECT ENCODE(raw_col, 'escape') FROM raw_data"
  complexity: 4
  constructs: ["UTL_RAW"]
  tags: ["raw", "reviewer_gap"]
  acceptance_criteria:
    - "UTL_RAW.CAST_TO_VARCHAR2 converts raw bytes to varchar"
    - "PG ENCODE with 'escape' provides similar functionality"

# ---------------------------------------------------------------------------
# DBMS_RANDOM
# ---------------------------------------------------------------------------

- name: dbms_random_value
  category: functions
  oracle: "SELECT DBMS_RANDOM.VALUE FROM DUAL"
  expected_postgresql: "SELECT random()"
  complexity: 2
  constructs: ["DBMS_RANDOM", "DUAL"]
  tags: ["random", "reviewer_gap"]
  acceptance_criteria:
    - "DBMS_RANDOM.VALUE returns 0-1 random number, same as PG random()"

- name: dbms_random_value_range
  category: functions
  oracle: "SELECT DBMS_RANDOM.VALUE(1, 100) FROM DUAL"
  expected_postgresql: "SELECT floor(random() * 100 + 1)::INTEGER"
  complexity: 3
  constructs: ["DBMS_RANDOM", "DUAL"]
  tags: ["random", "reviewer_gap"]
  acceptance_criteria:
    - "DBMS_RANDOM.VALUE(low, high) returns random number in range"

# ---------------------------------------------------------------------------
# DBMS_UTILITY
# ---------------------------------------------------------------------------

- name: dbms_utility_format_error_backtrace
  category: functions
  oracle: |
    BEGIN
      NULL;
    EXCEPTION WHEN OTHERS THEN
      DBMS_OUTPUT.PUT_LINE(DBMS_UTILITY.FORMAT_ERROR_BACKTRACE);
    END;
  expected_postgresql: |
    BEGIN
      NULL;
    EXCEPTION WHEN OTHERS THEN
      DECLARE
        v_stack TEXT;
      BEGIN
        GET STACKED DIAGNOSTICS v_stack = PG_EXCEPTION_CONTEXT;
        RAISE NOTICE '%', v_stack;
      END;
    END;
  complexity: 6
  constructs: ["DBMS_UTILITY", "FORMAT_ERROR_BACKTRACE"]
  tags: ["diagnostics", "reviewer_gap"]
  acceptance_criteria:
    - "DBMS_UTILITY.FORMAT_ERROR_BACKTRACE maps to GET STACKED DIAGNOSTICS"

# ---------------------------------------------------------------------------
# SYS_GUID
# ---------------------------------------------------------------------------

- name: sys_guid
  category: functions
  oracle: "SELECT SYS_GUID() FROM DUAL"
  expected_postgresql: "SELECT gen_random_uuid()"
  complexity: 2
  constructs: ["SYS_GUID", "DUAL"]
  tags: ["uuid", "reviewer_gap"]
  acceptance_criteria:
    - "SYS_GUID() returns 32-char hex; gen_random_uuid() returns UUID type"
