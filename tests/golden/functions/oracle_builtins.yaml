# ---------------------------------------------------------------------------
# REGEXP_COUNT
# ---------------------------------------------------------------------------

- name: regexp_count
  category: functions
  oracle: "SELECT REGEXP_COUNT('hello world hello', 'hello') FROM DUAL"
  expected_postgresql: "SELECT (SELECT COUNT(*) FROM regexp_matches('hello world hello', 'hello', 'g'))"
  complexity: 5
  constructs: ["REGEXP_COUNT", "DUAL"]
  tags: ["regexp", "reviewer_gap"]
  acceptance_criteria:
    - "Oracle REGEXP_COUNT has no direct PG function"
    - "Use COUNT over regexp_matches with 'g' flag"

# ---------------------------------------------------------------------------
# DUMP and VSIZE
# ---------------------------------------------------------------------------

- name: dump_no_equivalent
  category: functions
  oracle: "SELECT DUMP(salary) FROM employees WHERE id = 1"
  expected_postgresql: null
  complexity: 8
  constructs: ["DUMP"]
  tags: ["no_pg_equivalent", "manual_required", "reviewer_gap"]
  acceptance_criteria:
    - "Oracle DUMP() shows internal representation; no PG equivalent"
    - "Flag for manual review"

- name: vsize_to_pg_column_size
  category: functions
  oracle: "SELECT VSIZE(name) FROM employees"
  expected_postgresql: "SELECT pg_column_size(name) FROM employees"
  complexity: 3
  constructs: ["VSIZE"]
  tags: ["introspection", "reviewer_gap"]
  acceptance_criteria:
    - "VSIZE returns bytes used; pg_column_size is closest equivalent"
    - "Values may differ due to encoding differences"

# ---------------------------------------------------------------------------
# XML functions
# ---------------------------------------------------------------------------

- name: xmlelement_xmlforest
  category: functions
  oracle: >-
    SELECT XMLELEMENT("employee",
      XMLFOREST(first_name AS "firstName", last_name AS "lastName"))
    FROM employees
  expected_postgresql: >-
    SELECT XMLELEMENT(NAME "employee",
      XMLFOREST(first_name AS "firstName", last_name AS "lastName"))
    FROM employees
  complexity: 5
  constructs: ["XMLELEMENT", "XMLFOREST"]
  tags: ["xml", "reviewer_gap"]
  acceptance_criteria:
    - "PG XMLELEMENT requires NAME keyword before element name"
    - "XMLFOREST syntax is compatible between Oracle and PG"

- name: xmlagg
  category: functions
  oracle: >-
    SELECT department_id,
      XMLAGG(XMLELEMENT("emp", employee_name) ORDER BY employee_name)
    FROM employees GROUP BY department_id
  expected_postgresql: >-
    SELECT department_id,
      XMLAGG(XMLELEMENT(NAME "emp", employee_name) ORDER BY employee_name)
    FROM employees GROUP BY department_id
  complexity: 5
  constructs: ["XMLAGG", "XMLELEMENT"]
  tags: ["xml", "reviewer_gap"]
  acceptance_criteria:
    - "XMLAGG works similarly in both Oracle and PG"
    - "XMLELEMENT inside needs NAME keyword fix"

# ---------------------------------------------------------------------------
# JSON functions (Oracle → PG)
# ---------------------------------------------------------------------------

- name: json_table
  category: functions
  oracle: >-
    SELECT jt.name, jt.age
    FROM orders o,
    JSON_TABLE(o.json_data, '$.items[*]'
      COLUMNS (name VARCHAR2(100) PATH '$.name',
               age NUMBER PATH '$.age')) jt
  expected_postgresql: >-
    SELECT jt.name, jt.age
    FROM orders o,
    jsonb_to_recordset(o.json_data->'items')
    AS jt(name VARCHAR(100), age NUMERIC)
  complexity: 7
  constructs: ["JSON_TABLE"]
  tags: ["json", "reviewer_gap"]
  acceptance_criteria:
    - "Oracle JSON_TABLE maps to PG jsonb_to_recordset for arrays"
    - "JSON path expressions differ between Oracle and PG"

- name: json_value
  category: functions
  oracle: "SELECT JSON_VALUE(data, '$.name') FROM orders"
  expected_postgresql: "SELECT data->>'name' FROM orders"
  complexity: 3
  constructs: ["JSON_VALUE"]
  tags: ["json", "reviewer_gap"]
  acceptance_criteria:
    - "JSON_VALUE extracts scalar; PG ->> operator returns text"

- name: json_query
  category: functions
  oracle: "SELECT JSON_QUERY(data, '$.address') FROM customers"
  expected_postgresql: "SELECT data->'address' FROM customers"
  complexity: 3
  constructs: ["JSON_QUERY"]
  tags: ["json", "reviewer_gap"]
  acceptance_criteria:
    - "JSON_QUERY extracts object/array; PG -> operator returns jsonb"
