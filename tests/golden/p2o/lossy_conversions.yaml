# =============================================================================
# SteinDB Golden Tests — P2O Lossy Conversions
# PostgreSQL features that lose functionality when converted to Oracle
# =============================================================================

# ---------------------------------------------------------------------------
# JSON OPERATOR LOSS
# ---------------------------------------------------------------------------

- name: jsonb_arrow_operator_to_clob
  category: p2o_lossy
  direction: pg_to_oracle
  source: >-
    SELECT metadata->>'name' AS name,
           metadata->'address'->>'city' AS city
    FROM customers
    WHERE metadata @> '{"vip": true}'
  expected: >-
    SELECT JSON_VALUE(metadata, '$.name') AS name,
           JSON_VALUE(metadata, '$.address.city') AS city
    FROM customers
    WHERE JSON_EXISTS(metadata, '$.vip?(@ == true)')
  constructs: ["JSONB", "->>", "@>"]
  tags: ["lossy", "json", "p2o"]
  acceptance_criteria:
    - "PG JSONB ->> operator maps to Oracle JSON_VALUE"
    - "PG @> containment operator maps to Oracle JSON_EXISTS"
    - "GIN index on JSONB cannot be directly replicated"

# ---------------------------------------------------------------------------
# ARRAY OPERATIONS LOSS
# ---------------------------------------------------------------------------

- name: array_any_to_nested_table
  category: p2o_lossy
  direction: pg_to_oracle
  source: >-
    SELECT * FROM posts WHERE 'sql' = ANY(tags)
  expected: >-
    SELECT * FROM posts
    WHERE 'sql' IN (SELECT COLUMN_VALUE FROM TABLE(tags))
  constructs: ["ARRAY", "ANY"]
  tags: ["lossy", "array", "p2o"]
  acceptance_criteria:
    - "PG ANY(array) has no Oracle array equivalent"
    - "Requires TABLE() operator with nested table/VARRAY"

# ---------------------------------------------------------------------------
# TABLE INHERITANCE
# ---------------------------------------------------------------------------

- name: table_inheritance_to_fk_pattern
  category: p2o_lossy
  direction: pg_to_oracle
  source: >-
    CREATE TABLE shapes (id SERIAL PRIMARY KEY, color VARCHAR(20));
    CREATE TABLE circles (radius NUMERIC) INHERITS (shapes);
    CREATE TABLE rectangles (width NUMERIC, height NUMERIC) INHERITS (shapes);
  expected: >-
    CREATE TABLE shapes (
      id NUMBER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
      color VARCHAR2(20),
      shape_type VARCHAR2(20)
    );
    CREATE TABLE circles (
      id NUMBER PRIMARY KEY REFERENCES shapes(id),
      radius NUMBER
    );
    CREATE TABLE rectangles (
      id NUMBER PRIMARY KEY REFERENCES shapes(id),
      width NUMBER,
      height NUMBER
    )
  constructs: ["INHERITS"]
  tags: ["lossy", "inheritance", "llm_required", "p2o"]
  acceptance_criteria:
    - "Oracle has no table inheritance"
    - "Must manually restructure to table-per-type with FK"
    - "SELECT * FROM shapes no longer returns child rows automatically"

# ---------------------------------------------------------------------------
# LATERAL JOIN READABILITY LOSS
# ---------------------------------------------------------------------------

- name: lateral_join_readability_loss
  category: p2o_lossy
  direction: pg_to_oracle
  source: >-
    SELECT o.id, o.customer_id, recent.total
    FROM orders o,
    LATERAL (
      SELECT SUM(amount) AS total
      FROM order_items
      WHERE order_id = o.id AND created_at > o.order_date - INTERVAL '30 days'
    ) recent
  expected: >-
    SELECT o.id, o.customer_id,
      (SELECT SUM(amount)
       FROM order_items
       WHERE order_id = o.id AND created_at > o.order_date - 30) AS total
    FROM orders o
  constructs: ["LATERAL"]
  tags: ["lossy", "joins", "p2o"]

# ---------------------------------------------------------------------------
# DISTINCT ON
# ---------------------------------------------------------------------------

- name: distinct_on_to_analytic
  category: p2o_lossy
  direction: pg_to_oracle
  source: >-
    SELECT DISTINCT ON (customer_id)
      customer_id, order_date, total
    FROM orders
    ORDER BY customer_id, order_date DESC
  expected: >-
    SELECT customer_id, order_date, total FROM (
      SELECT customer_id, order_date, total,
        ROW_NUMBER() OVER (PARTITION BY customer_id ORDER BY order_date DESC) AS rn
      FROM orders
    ) WHERE rn = 1
  constructs: ["DISTINCT ON"]
  tags: ["lossy", "analytic", "p2o"]
  acceptance_criteria:
    - "PG DISTINCT ON is concise and expressive"
    - "Oracle equivalent requires subquery with ROW_NUMBER"

# ---------------------------------------------------------------------------
# FILTER(WHERE) ON AGGREGATE
# ---------------------------------------------------------------------------

- name: filter_where_to_case_when
  category: p2o_lossy
  direction: pg_to_oracle
  source: >-
    SELECT department_id,
      COUNT(*) FILTER (WHERE status = 'active') AS active_ct,
      AVG(salary) FILTER (WHERE tenure > 5) AS senior_avg
    FROM employees GROUP BY department_id
  expected: >-
    SELECT department_id,
      COUNT(CASE WHEN status = 'active' THEN 1 END) AS active_ct,
      AVG(CASE WHEN tenure > 5 THEN salary END) AS senior_avg
    FROM employees GROUP BY department_id
  constructs: ["FILTER"]
  tags: ["lossy", "aggregate", "p2o"]

# ---------------------------------------------------------------------------
# RANGE TYPES
# ---------------------------------------------------------------------------

- name: range_type_to_two_columns
  category: p2o_lossy
  direction: pg_to_oracle
  source: >-
    CREATE TABLE bookings (
      id SERIAL PRIMARY KEY,
      room INTEGER,
      period DATERANGE,
      EXCLUDE USING GIST (room WITH =, period WITH &&)
    )
  expected: >-
    CREATE TABLE bookings (
      id NUMBER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
      room NUMBER(10),
      period_start DATE,
      period_end DATE,
      CONSTRAINT chk_period CHECK (period_start < period_end)
    )
  constructs: ["DATERANGE", "EXCLUDE"]
  tags: ["lossy", "range", "p2o"]
  acceptance_criteria:
    - "PG range types split into start/end columns"
    - "EXCLUDE constraint lost; must enforce overlap prevention via trigger"

# ---------------------------------------------------------------------------
# FULL-TEXT SEARCH
# ---------------------------------------------------------------------------

- name: tsvector_to_oracle_text
  category: p2o_lossy
  direction: pg_to_oracle
  source: >-
    CREATE TABLE articles (
      id SERIAL PRIMARY KEY,
      title TEXT,
      body TEXT,
      search_vector TSVECTOR
    );
    CREATE INDEX idx_search ON articles USING GIN (search_vector);
    SELECT * FROM articles WHERE search_vector @@ to_tsquery('database & migration')
  expected: >-
    CREATE TABLE articles (
      id NUMBER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
      title CLOB,
      body CLOB
    );
    CREATE INDEX idx_search ON articles (body) INDEXTYPE IS CTXSYS.CONTEXT;
    SELECT * FROM articles WHERE CONTAINS(body, 'database AND migration') > 0
  constructs: ["TSVECTOR", "GIN", "@@", "to_tsquery"]
  tags: ["lossy", "fulltext", "llm_required", "p2o"]
  acceptance_criteria:
    - "PG tsvector/tsquery has completely different API from Oracle Text"
    - "Oracle Text uses CONTAINS() and CTXSYS.CONTEXT index type"
    - "Query syntax is different: & vs AND, | vs OR"

# ---------------------------------------------------------------------------
# LISTEN/NOTIFY
# ---------------------------------------------------------------------------

- name: listen_notify_to_dbms_aq
  category: p2o_lossy
  direction: pg_to_oracle
  source: >-
    LISTEN order_events;
    NOTIFY order_events, '{"order_id": 123, "status": "shipped"}';
  expected: >-
    /* WARNING: PG LISTEN/NOTIFY maps to Oracle Advanced Queuing (DBMS_AQ) */
    /* Requires AQ queue setup: */
    BEGIN
      DBMS_AQADM.CREATE_QUEUE_TABLE('order_events_qt', 'SYS.AQ$_JMS_TEXT_MESSAGE');
      DBMS_AQADM.CREATE_QUEUE('order_events_q', 'order_events_qt');
      DBMS_AQADM.START_QUEUE('order_events_q');
    END;
  constructs: ["LISTEN", "NOTIFY"]
  tags: ["lossy", "messaging", "llm_required", "p2o"]
  acceptance_criteria:
    - "PG LISTEN/NOTIFY is lightweight pub/sub"
    - "Oracle AQ is a full messaging system — much more complex"
    - "Completely different API and setup requirements"

# ---------------------------------------------------------------------------
# ROW-LEVEL SECURITY
# ---------------------------------------------------------------------------

- name: rls_to_vpd
  category: p2o_lossy
  direction: pg_to_oracle
  source: >-
    ALTER TABLE documents ENABLE ROW LEVEL SECURITY;
    CREATE POLICY tenant_isolation ON documents
    USING (tenant_id = current_setting('app.current_tenant')::INTEGER)
  expected: >-
    /* WARNING: PG RLS maps to Oracle VPD (Virtual Private Database) */
    CREATE OR REPLACE FUNCTION tenant_policy(
      p_schema VARCHAR2, p_table VARCHAR2
    ) RETURN VARCHAR2 IS
    BEGIN
      RETURN 'tenant_id = SYS_CONTEXT(''app_ctx'', ''current_tenant'')';
    END;
    /
    BEGIN
      DBMS_RLS.ADD_POLICY(
        object_schema => USER,
        object_name => 'DOCUMENTS',
        policy_name => 'TENANT_ISOLATION',
        function_schema => USER,
        policy_function => 'TENANT_POLICY'
      );
    END;
  constructs: ["RLS", "POLICY"]
  tags: ["lossy", "security", "llm_required", "p2o"]
  acceptance_criteria:
    - "PG RLS uses CREATE POLICY with USING clause"
    - "Oracle VPD uses DBMS_RLS with policy functions"
    - "Completely different mechanism but same security goal"

# ---------------------------------------------------------------------------
# ADDITIONAL LOSSY CONVERSIONS
# ---------------------------------------------------------------------------

- name: materialized_view_concurrently_refresh
  category: p2o_lossy
  direction: pg_to_oracle
  source: >-
    CREATE MATERIALIZED VIEW monthly_stats AS
    SELECT date_trunc('month', created_at) AS month, COUNT(*) AS total
    FROM orders GROUP BY 1;
    REFRESH MATERIALIZED VIEW CONCURRENTLY monthly_stats
  expected: >-
    CREATE MATERIALIZED VIEW monthly_stats AS
    SELECT TRUNC(created_at, 'MM') AS month, COUNT(*) AS total
    FROM orders GROUP BY TRUNC(created_at, 'MM');
    /* Use DBMS_MVIEW.REFRESH('monthly_stats', 'C') for complete refresh */
  constructs: ["MATERIALIZED VIEW", "CONCURRENTLY"]
  tags: ["lossy", "materialized_view", "p2o"]
  acceptance_criteria:
    - "PG REFRESH CONCURRENTLY allows non-blocking refresh with unique index"
    - "Oracle MV refresh is different: DBMS_MVIEW package"

- name: generated_stored_column
  category: p2o_lossy
  direction: pg_to_oracle
  source: >-
    CREATE TABLE products (
      price NUMERIC(10,2),
      tax_rate NUMERIC(5,4),
      total NUMERIC(10,2) GENERATED ALWAYS AS (price * (1 + tax_rate)) STORED
    )
  expected: >-
    CREATE TABLE products (
      price NUMBER(10,2),
      tax_rate NUMBER(5,4),
      total NUMBER(10,2) GENERATED ALWAYS AS (price * (1 + tax_rate)) VIRTUAL
    )
  constructs: ["GENERATED ALWAYS AS", "STORED"]
  tags: ["lossy", "computed", "p2o"]
  acceptance_criteria:
    - "PG supports STORED generated columns (physically stored)"
    - "Oracle supports VIRTUAL generated columns (computed on read)"
    - "Semantic difference: Oracle virtual columns cannot be indexed directly in all cases"

- name: copy_command_to_sqlldr
  category: p2o_lossy
  direction: pg_to_oracle
  source: "COPY orders FROM '/data/orders.csv' WITH (FORMAT csv, HEADER true)"
  expected: >-
    /* WARNING: PG COPY has no direct Oracle SQL equivalent */
    /* Use SQL*Loader or external tables:
    CREATE TABLE orders_ext (...)
    ORGANIZATION EXTERNAL (
      TYPE ORACLE_LOADER DEFAULT DIRECTORY data_dir
      ACCESS PARAMETERS (RECORDS DELIMITED BY NEWLINE SKIP 1
        FIELDS TERMINATED BY ',')
      LOCATION ('orders.csv')
    ) */
  constructs: ["COPY"]
  tags: ["lossy", "data_loading", "llm_required", "p2o"]

- name: json_build_object_to_json_object
  category: p2o_lossy
  direction: pg_to_oracle
  source: >-
    SELECT json_build_object('id', id, 'name', name, 'email', email)
    FROM users
  expected: >-
    SELECT JSON_OBJECT('id' VALUE id, 'name' VALUE name, 'email' VALUE email)
    FROM users
  constructs: ["json_build_object"]
  tags: ["lossy", "json", "p2o"]

- name: jsonb_array_agg_to_json_arrayagg
  category: p2o_lossy
  direction: pg_to_oracle
  source: >-
    SELECT dept_id, jsonb_agg(jsonb_build_object('name', name, 'salary', salary))
    FROM employees GROUP BY dept_id
  expected: >-
    SELECT dept_id,
      JSON_ARRAYAGG(JSON_OBJECT('name' VALUE name, 'salary' VALUE salary))
    FROM employees GROUP BY dept_id
  constructs: ["jsonb_agg", "jsonb_build_object"]
  tags: ["lossy", "json", "p2o"]
