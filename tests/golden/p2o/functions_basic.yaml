# =============================================================================
# SteinDB Golden Tests — P2O Function Conversions (Basic)
# PostgreSQL-to-Oracle reverse mappings for functions
# =============================================================================

# ---------------------------------------------------------------------------
# PG-specific functions → Oracle equivalents
# ---------------------------------------------------------------------------

- name: coalesce_to_nvl
  category: p2o_functions
  direction: pg_to_oracle
  source: "SELECT COALESCE(name, 'Unknown') FROM employees"
  expected: "SELECT NVL(name, 'Unknown') FROM employees"
  complexity: 1
  constructs: ["COALESCE"]
  tags: ["p2o", "null_handling", "reviewer_gap"]
  acceptance_criteria:
    - "PG COALESCE with 2 args maps to Oracle NVL"
    - "COALESCE with 3+ args stays as COALESCE (Oracle supports it)"

- name: string_agg_to_listagg
  category: p2o_functions
  direction: pg_to_oracle
  source: >-
    SELECT department_id, STRING_AGG(name, ', ' ORDER BY name)
    FROM employees GROUP BY department_id
  expected: >-
    SELECT department_id,
      LISTAGG(name, ', ') WITHIN GROUP (ORDER BY name)
    FROM employees GROUP BY department_id
  complexity: 4
  constructs: ["STRING_AGG"]
  tags: ["p2o", "aggregate", "reviewer_gap"]
  acceptance_criteria:
    - "PG STRING_AGG maps to Oracle LISTAGG"
    - "ORDER BY moves inside WITHIN GROUP clause"

- name: gen_random_uuid_to_sys_guid
  category: p2o_functions
  direction: pg_to_oracle
  source: "SELECT gen_random_uuid()"
  expected: "SELECT SYS_GUID() FROM DUAL"
  complexity: 2
  constructs: ["gen_random_uuid"]
  tags: ["p2o", "uuid", "reviewer_gap"]
  acceptance_criteria:
    - "PG gen_random_uuid() maps to Oracle SYS_GUID()"
    - "Format differs (UUID vs RAW) but both generate unique IDs"

