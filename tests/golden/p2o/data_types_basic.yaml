# ---------------------------------------------------------------------------
# BINARY / SPECIAL TYPES
# ---------------------------------------------------------------------------

- name: bytea_to_blob
  category: p2o_data_types
  direction: pg_to_oracle
  source: "CREATE TABLE t (data BYTEA)"
  expected: "CREATE TABLE t (data BLOB)"
  constructs: ["BYTEA"]
