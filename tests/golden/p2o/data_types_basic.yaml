  direction: pg_to_oracle
  source: "CREATE TABLE t (id INTEGER)"
  expected: "CREATE TABLE t (id NUMBER(10))"
  constructs: ["INTEGER"]
  tags: ["numeric", "p2o"]

- name: bigint_to_number19
  category: p2o_data_types
  direction: pg_to_oracle
  source: "CREATE TABLE t (big_id BIGINT)"
  expected: "CREATE TABLE t (big_id NUMBER(19))"
  constructs: ["BIGINT"]
  tags: ["numeric", "p2o"]

- name: smallint_to_number5
  category: p2o_data_types
  direction: pg_to_oracle
  source: "CREATE TABLE t (small_val SMALLINT)"
  expected: "CREATE TABLE t (small_val NUMBER(5))"
  constructs: ["SMALLINT"]
  tags: ["numeric", "p2o"]

- name: boolean_to_number1
  category: p2o_data_types
  direction: pg_to_oracle
  source: "CREATE TABLE t (is_active BOOLEAN)"
  expected: "CREATE TABLE t (is_active NUMBER(1))"
  constructs: ["BOOLEAN"]
