# =============================================================================
# SteinDB Golden Tests — P2O Data Type Conversions (Basic)
# PostgreSQL-to-Oracle reverse mappings for fundamental data types
# =============================================================================

# ---------------------------------------------------------------------------
# STRING TYPES
# ---------------------------------------------------------------------------

- name: varchar_to_varchar2
  category: p2o_data_types
  direction: pg_to_oracle
  source: "CREATE TABLE t (name VARCHAR(100))"
  expected: "CREATE TABLE t (name VARCHAR2(100))"
  constructs: ["VARCHAR"]
  tags: ["string", "p2o"]

- name: text_to_clob
  category: p2o_data_types
  direction: pg_to_oracle
  source: "CREATE TABLE t (description TEXT)"
  expected: "CREATE TABLE t (description CLOB)"
  constructs: ["TEXT"]
  tags: ["string", "lob", "p2o"]

- name: char_to_char
  category: p2o_data_types
  direction: pg_to_oracle
  source: "CREATE TABLE t (code CHAR(5))"
  expected: "CREATE TABLE t (code CHAR(5))"
  constructs: ["CHAR"]
  tags: ["string", "p2o"]

# ---------------------------------------------------------------------------
# NUMERIC TYPES
# ---------------------------------------------------------------------------

