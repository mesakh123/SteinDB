# =============================================================================
# SteinDB Golden Tests — P2O Function Conversions (Extended)
# PostgreSQL functions → Oracle function equivalents
# =============================================================================

# ---------------------------------------------------------------------------
# STRING FUNCTIONS
# ---------------------------------------------------------------------------

- name: coalesce_two_args_to_nvl
  category: p2o_functions
  direction: pg_to_oracle
  source: "SELECT COALESCE(nickname, 'N/A') FROM users"
  expected: "SELECT NVL(nickname, 'N/A') /* NOTE: NVL evaluates both args; COALESCE short-circuits */ FROM users"
  constructs: ["COALESCE"]
  tags: ["function", "null_handling", "p2o"]
  acceptance_criteria:
    - "COALESCE(a,b) with 2 args maps to NVL(a,b)"
    - "WARNING: NVL evaluates both arguments unconditionally"
    - "COALESCE short-circuits (only evaluates until first non-NULL)"
    - "Side-effect-producing second argument may behave differently"

- name: substring_from_for_to_substr
  category: p2o_functions
  direction: pg_to_oracle
  source: "SELECT SUBSTRING(name FROM 1 FOR 3) FROM users"
  expected: "SELECT SUBSTR(name, 1, 3) FROM users"
  constructs: ["SUBSTRING"]
  tags: ["function", "string", "p2o"]

- name: position_to_instr
  category: p2o_functions
  direction: pg_to_oracle
  source: "SELECT POSITION('@' IN email) FROM users"
  expected: "SELECT INSTR(email, '@') FROM users"
  constructs: ["POSITION"]
  tags: ["function", "string", "p2o"]

- name: string_agg_to_listagg
  category: p2o_functions
  direction: pg_to_oracle
  source: >-
    SELECT dept_id, STRING_AGG(name, ', ' ORDER BY name)
    FROM employees GROUP BY dept_id
  expected: >-
    SELECT dept_id,
      LISTAGG(name, ', ') WITHIN GROUP (ORDER BY name)
    FROM employees GROUP BY dept_id
  constructs: ["STRING_AGG"]
  tags: ["function", "aggregate", "p2o"]

# ---------------------------------------------------------------------------
# REGEX / PATTERN MATCHING
# ---------------------------------------------------------------------------

- name: regex_match_to_regexp_like
  category: p2o_functions
  direction: pg_to_oracle
  source: "SELECT * FROM users WHERE email ~ '^[a-z]+@example\\.com$'"
  expected: "SELECT * FROM users WHERE REGEXP_LIKE(email, '^[a-z]+@example\\.com$')"
  constructs: ["REGEX"]
  tags: ["function", "regex", "p2o"]

# ---------------------------------------------------------------------------
# TYPE CASTING
# ---------------------------------------------------------------------------

- name: cast_numeric_to_to_number
  category: p2o_functions
  direction: pg_to_oracle
  source: "SELECT CAST(amount_text AS NUMERIC) FROM invoices"
  expected: "SELECT TO_NUMBER(amount_text) FROM invoices"
  constructs: ["CAST"]
  tags: ["function", "casting", "p2o"]

