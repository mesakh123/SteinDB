# ---------------------------------------------------------------------------
# DATE/TIME FUNCTIONS
# ---------------------------------------------------------------------------

- name: now_to_sysdate
  category: p2o_functions
  direction: pg_to_oracle
  source: "SELECT NOW()"
  expected: "SELECT SYSDATE FROM DUAL"
  constructs: ["NOW"]
  tags: ["function", "datetime", "p2o"]

- name: age_to_months_between
  category: p2o_functions
  direction: pg_to_oracle
  source: "SELECT AGE(end_date, start_date) FROM contracts"
  expected: "SELECT MONTHS_BETWEEN(end_date, start_date) FROM contracts"
  constructs: ["AGE"]
  tags: ["function", "datetime", "p2o"]
  acceptance_criteria:
    - "PG AGE returns INTERVAL, Oracle MONTHS_BETWEEN returns NUMBER"
    - "Semantic difference: AGE gives years/months/days, MONTHS_BETWEEN gives fractional months"

- name: date_part_to_extract
  category: p2o_functions
  direction: pg_to_oracle
  source: "SELECT date_part('year', hire_date) FROM employees"
  expected: "SELECT EXTRACT(YEAR FROM hire_date) FROM employees"
  constructs: ["date_part"]
  tags: ["function", "datetime", "p2o"]

# ---------------------------------------------------------------------------
# ADDITIONAL STRING FUNCTIONS
# ---------------------------------------------------------------------------

- name: concat_ws_to_concat_nvl
  category: p2o_functions
  direction: pg_to_oracle
  source: "SELECT CONCAT_WS(', ', city, state, zip) FROM addresses"
  expected: >-
    SELECT city || ', ' || state || ', ' || zip FROM addresses
  constructs: ["CONCAT_WS"]
  tags: ["function", "string", "p2o"]
  acceptance_criteria:
    - "PG CONCAT_WS skips NULLs automatically"
    - "Oracle concatenation propagates NULLs; may need NVL wrappers"

- name: left_right_to_substr
  category: p2o_functions
  direction: pg_to_oracle
  source: "SELECT LEFT(name, 3), RIGHT(name, 3) FROM users"
  expected: "SELECT SUBSTR(name, 1, 3), SUBSTR(name, -3) FROM users"
  constructs: ["LEFT", "RIGHT"]
  tags: ["function", "string", "p2o"]

- name: regexp_replace_to_regexp_replace
  category: p2o_functions
  direction: pg_to_oracle
  source: "SELECT REGEXP_REPLACE(phone, '[^0-9]', '', 'g') FROM contacts"
  expected: "SELECT REGEXP_REPLACE(phone, '[^0-9]', '') FROM contacts"
  constructs: ["REGEXP_REPLACE"]
  tags: ["function", "regex", "p2o"]
  acceptance_criteria:
    - "PG REGEXP_REPLACE requires 'g' flag for global replace"
    - "Oracle REGEXP_REPLACE is global by default"

- name: md5_to_dbms_crypto
  category: p2o_functions
  direction: pg_to_oracle
  source: "SELECT MD5(password) FROM users"
  expected: >-
    SELECT LOWER(RAWTOHEX(DBMS_CRYPTO.HASH(UTL_RAW.CAST_TO_RAW(password), DBMS_CRYPTO.HASH_MD5)))
    FROM users
  constructs: ["MD5"]
  tags: ["function", "crypto", "p2o"]

- name: array_agg_to_collect
  category: p2o_functions
  direction: pg_to_oracle
  source: "SELECT dept_id, ARRAY_AGG(name ORDER BY name) FROM employees GROUP BY dept_id"
  expected: >-
    SELECT dept_id, CAST(COLLECT(name ORDER BY name) AS SYS.ODCIVARCHAR2LIST)
    FROM employees GROUP BY dept_id
  constructs: ["ARRAY_AGG"]
  tags: ["function", "aggregate", "p2o"]

- name: unnest_to_table
  category: p2o_functions
  direction: pg_to_oracle
  source: "SELECT unnest(ARRAY[1,2,3])"
  expected: "SELECT COLUMN_VALUE FROM TABLE(SYS.ODCINUMBERLIST(1,2,3))"
  constructs: ["unnest", "ARRAY"]
  tags: ["function", "array", "p2o"]

- name: to_char_timestamp_format
  category: p2o_functions
  direction: pg_to_oracle
  source: "SELECT TO_CHAR(created_at, 'YYYY-MM-DD HH24:MI:SS') FROM events"
  expected: "SELECT TO_CHAR(created_at, 'YYYY-MM-DD HH24:MI:SS') FROM events"
  constructs: ["TO_CHAR"]
  tags: ["function", "datetime", "p2o"]
  acceptance_criteria:
    - "TO_CHAR format strings are mostly compatible between PG and Oracle"

- name: greatest_least_same
  category: p2o_functions
  direction: pg_to_oracle
  source: "SELECT GREATEST(a, b, c), LEAST(a, b, c) FROM numbers"
  expected: "SELECT GREATEST(a, b, c), LEAST(a, b, c) FROM numbers"
  constructs: ["GREATEST", "LEAST"]
  tags: ["function", "comparison", "p2o"]
  acceptance_criteria:
    - "GREATEST/LEAST supported in both PG and Oracle"
    - "NULL handling differs: PG returns NULL if any arg is NULL; Oracle skips NULLs"
