- name: trigger_with_exception_handling
  category: p2o_triggers
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION safe_audit()
    RETURNS TRIGGER AS $$
    BEGIN
      BEGIN
        INSERT INTO audit_log (record_id, action) VALUES (NEW.id, TG_OP);
      EXCEPTION WHEN OTHERS THEN
        RAISE WARNING 'Audit failed: %', SQLERRM;
      END;
      RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;
    CREATE TRIGGER trg_safe_audit AFTER INSERT ON orders
    FOR EACH ROW EXECUTE FUNCTION safe_audit()
  expected: >-
    CREATE OR REPLACE TRIGGER trg_safe_audit AFTER INSERT ON orders
    FOR EACH ROW
    BEGIN
      BEGIN
        INSERT INTO audit_log (record_id, action) VALUES (:NEW.id, 'INSERT');
      EXCEPTION WHEN OTHERS THEN
        DBMS_OUTPUT.PUT_LINE('Audit failed: ' || SQLERRM);
      END;
    END;
    /
  constructs: ["TRIGGER", "EXCEPTION", "SQLERRM"]
  tags: ["trigger", "exception", "p2o"]

