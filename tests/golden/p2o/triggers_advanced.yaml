- name: trigger_new_old_record_access
  category: p2o_triggers
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION track_price_change()
    RETURNS TRIGGER AS $$
    BEGIN
      IF OLD.price <> NEW.price THEN
        INSERT INTO price_history (product_id, old_price, new_price, changed_at)
        VALUES (OLD.id, OLD.price, NEW.price, NOW());
      END IF;
      RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;
    CREATE TRIGGER trg_price AFTER UPDATE ON products
    FOR EACH ROW EXECUTE FUNCTION track_price_change()
  expected: >-
    CREATE OR REPLACE TRIGGER trg_price AFTER UPDATE ON products
    FOR EACH ROW
    BEGIN
      IF :OLD.price <> :NEW.price THEN
        INSERT INTO price_history (product_id, old_price, new_price, changed_at)
        VALUES (:OLD.id, :OLD.price, :NEW.price, SYSDATE);
      END IF;
    END;
    /
  constructs: ["TRIGGER", "OLD", "NEW"]
  tags: ["trigger", "p2o"]

