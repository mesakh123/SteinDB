# =============================================================================
# SteinDB Golden Tests — P2O PL/pgSQL → PL/SQL Conversions (Extended)
# PostgreSQL procedural code → Oracle PL/SQL
# =============================================================================

# ---------------------------------------------------------------------------
# FUNCTION STRUCTURE
# ---------------------------------------------------------------------------

- name: returns_type_to_return_type
  category: p2o_plsql
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION get_count()
    RETURNS INTEGER AS $$
    BEGIN
      RETURN (SELECT COUNT(*) FROM items);
    END;
    $$ LANGUAGE plpgsql
  expected: >-
    CREATE OR REPLACE FUNCTION get_count
    RETURN NUMBER IS
    v_result NUMBER;
    BEGIN
      SELECT COUNT(*) INTO v_result FROM items;
      RETURN v_result;
    END;
  constructs: ["RETURNS", "FUNCTION"]
  tags: ["plsql", "function", "p2o"]

- name: dollar_quoting_to_is_begin_end
  category: p2o_plsql
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION multiply(a INTEGER, b INTEGER)
    RETURNS INTEGER AS $$
    BEGIN
      RETURN a * b;
    END;
    $$ LANGUAGE plpgsql
  expected: >-
    CREATE OR REPLACE FUNCTION multiply(a NUMBER, b NUMBER)
    RETURN NUMBER IS
    BEGIN
      RETURN a * b;
    END;
  constructs: ["DOLLAR_QUOTING", "LANGUAGE_PLPGSQL"]
  tags: ["plsql", "function", "p2o"]

# ---------------------------------------------------------------------------
# RAISE / ERROR HANDLING
# ---------------------------------------------------------------------------

- name: raise_notice_to_dbms_output
  category: p2o_plsql
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION log_msg(msg TEXT)
    RETURNS VOID AS $$
    BEGIN
      RAISE NOTICE 'Message: %', msg;
    END;
    $$ LANGUAGE plpgsql
  expected: >-
    CREATE OR REPLACE PROCEDURE log_msg(msg VARCHAR2) IS
    BEGIN
      DBMS_OUTPUT.PUT_LINE('Message: ' || msg);
    END;
  constructs: ["RAISE_NOTICE", "DBMS_OUTPUT"]
  tags: ["plsql", "logging", "p2o"]

- name: raise_exception_to_raise_application_error
  category: p2o_plsql
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION check_limit(val INTEGER)
    RETURNS VOID AS $$
    BEGIN
      IF val > 1000 THEN
        RAISE EXCEPTION 'Value % exceeds limit', val;
      END IF;
    END;
    $$ LANGUAGE plpgsql
  expected: >-
    CREATE OR REPLACE PROCEDURE check_limit(val NUMBER) IS
    BEGIN
      IF val > 1000 THEN
        RAISE_APPLICATION_ERROR(-20001, 'Value ' || val || ' exceeds limit');
      END IF;
    END;
  constructs: ["RAISE_EXCEPTION", "RAISE_APPLICATION_ERROR"]
  tags: ["plsql", "error_handling", "p2o"]

# ---------------------------------------------------------------------------
# TRIGGER CONVERSIONS
# ---------------------------------------------------------------------------

- name: new_col_to_colon_new
  category: p2o_plsql
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION trg_audit()
    RETURNS TRIGGER AS $$
    BEGIN
      NEW.modified_at := CURRENT_TIMESTAMP;
      RETURN NEW;
    END;
    $$ LANGUAGE plpgsql
  expected: >-
    CREATE OR REPLACE TRIGGER trg_audit
    BEFORE UPDATE ON target_table
    FOR EACH ROW
    BEGIN
      :NEW.modified_at := SYSTIMESTAMP;
    END;
  constructs: ["TRIGGER", "NEW"]
  tags: ["plsql", "trigger", "p2o"]

- name: old_col_to_colon_old
  category: p2o_plsql
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION trg_log_change()
    RETURNS TRIGGER AS $$
    BEGIN
      INSERT INTO audit_log (old_value, new_value)
      VALUES (OLD.status, NEW.status);
      RETURN NEW;
    END;
    $$ LANGUAGE plpgsql
  expected: >-
    CREATE OR REPLACE TRIGGER trg_log_change
    AFTER UPDATE ON target_table
    FOR EACH ROW
    BEGIN
      INSERT INTO audit_log (old_value, new_value)
      VALUES (:OLD.status, :NEW.status);
    END;
  constructs: ["TRIGGER", "OLD", "NEW"]
  tags: ["plsql", "trigger", "p2o"]

# ---------------------------------------------------------------------------
# DYNAMIC SQL
# ---------------------------------------------------------------------------

- name: execute_to_execute_immediate
  category: p2o_plsql
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION run_ddl(p_sql TEXT)
    RETURNS VOID AS $$
    BEGIN
      EXECUTE p_sql;
    END;
    $$ LANGUAGE plpgsql
  expected: >-
    CREATE OR REPLACE PROCEDURE run_ddl(p_sql VARCHAR2) IS
    BEGIN
      EXECUTE IMMEDIATE p_sql;
    END;
  constructs: ["EXECUTE", "EXECUTE_IMMEDIATE"]
  tags: ["plsql", "dynamic_sql", "p2o"]

- name: select_into_strict_removal
  category: p2o_plsql
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION get_name(p_id INTEGER)
    RETURNS VARCHAR AS $$
    DECLARE
      v_name VARCHAR;
    BEGIN
      SELECT name INTO STRICT v_name FROM users WHERE id = p_id;
      RETURN v_name;
    END;
    $$ LANGUAGE plpgsql
  expected: >-
    CREATE OR REPLACE FUNCTION get_name(p_id NUMBER)
    RETURN VARCHAR2 IS
    v_name VARCHAR2(4000);
    BEGIN
      SELECT name INTO v_name FROM users WHERE id = p_id;
      RETURN v_name;
    END;
  constructs: ["SELECT_INTO_STRICT"]
  tags: ["plsql", "select_into", "p2o"]

# ---------------------------------------------------------------------------
# VARIABLE / TYPE CONVERSIONS
# ---------------------------------------------------------------------------

- name: integer_variable_to_number
  category: p2o_plsql
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION sum_range(start_val INTEGER, end_val INTEGER)
    RETURNS INTEGER AS $$
    DECLARE
      total INTEGER := 0;
      i INTEGER;
    BEGIN
      FOR i IN start_val..end_val LOOP
        total := total + i;
      END LOOP;
      RETURN total;
    END;
    $$ LANGUAGE plpgsql
  expected: >-
    CREATE OR REPLACE FUNCTION sum_range(start_val NUMBER, end_val NUMBER)
    RETURN NUMBER IS
    total NUMBER(10) := 0;
    i NUMBER(10);
    BEGIN
      FOR i IN start_val..end_val LOOP
        total := total + i;
      END LOOP;
      RETURN total;
    END;
  constructs: ["INTEGER", "VARIABLE"]
  tags: ["plsql", "types", "p2o"]

- name: refcursor_to_sys_refcursor
  category: p2o_plsql
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION get_employees()
    RETURNS REFCURSOR AS $$
    DECLARE
      ref REFCURSOR;
    BEGIN
      OPEN ref FOR SELECT * FROM employees;
      RETURN ref;
    END;
    $$ LANGUAGE plpgsql
  expected: >-
    CREATE OR REPLACE FUNCTION get_employees
    RETURN SYS_REFCURSOR IS
    ref SYS_REFCURSOR;
    BEGIN
      OPEN ref FOR SELECT * FROM employees;
      RETURN ref;
    END;
  constructs: ["REFCURSOR", "SYS_REFCURSOR"]
  tags: ["plsql", "cursor", "p2o"]

# ---------------------------------------------------------------------------
# COMBINED TRIGGER FUNCTION → SINGLE TRIGGER
# ---------------------------------------------------------------------------

- name: function_plus_trigger_to_single_trigger
  category: p2o_plsql
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION trg_set_created()
    RETURNS TRIGGER AS $$
    BEGIN
      NEW.created_at := NOW();
      RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;
    CREATE TRIGGER set_created BEFORE INSERT ON orders
    FOR EACH ROW EXECUTE FUNCTION trg_set_created()
  expected: >-
    CREATE OR REPLACE TRIGGER set_created
    BEFORE INSERT ON orders
    FOR EACH ROW
    BEGIN
      :NEW.created_at := SYSDATE;
    END;
  constructs: ["TRIGGER", "FUNCTION", "NOW"]
  tags: ["plsql", "trigger", "p2o"]

- name: return_new_old_null_behavior
  category: p2o_plsql
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION trg_validate()
    RETURNS TRIGGER AS $$
    BEGIN
      IF NEW.amount < 0 THEN
        RETURN NULL;
      END IF;
      RETURN NEW;
    END;
    $$ LANGUAGE plpgsql
  expected: >-
    CREATE OR REPLACE TRIGGER trg_validate
    BEFORE INSERT OR UPDATE ON target_table
    FOR EACH ROW
    BEGIN
      IF :NEW.amount < 0 THEN
        RAISE_APPLICATION_ERROR(-20001, 'Validation failed: negative amount');
      END IF;
    END;
  constructs: ["TRIGGER", "RETURN NULL"]
  tags: ["plsql", "trigger", "p2o"]
  acceptance_criteria:
    - "PG RETURN NULL in BEFORE trigger cancels the operation"
    - "Oracle equivalent is to raise an error to prevent the DML"

# ---------------------------------------------------------------------------
# EXCEPTION HANDLING
# ---------------------------------------------------------------------------

- name: unique_violation_to_dup_val_on_index
  category: p2o_plsql
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION safe_insert(p_name VARCHAR)
    RETURNS BOOLEAN AS $$
    BEGIN
      INSERT INTO users (name) VALUES (p_name);
      RETURN TRUE;
    EXCEPTION
      WHEN unique_violation THEN
        RETURN FALSE;
    END;
    $$ LANGUAGE plpgsql
  expected: >-
    CREATE OR REPLACE FUNCTION safe_insert(p_name VARCHAR2)
    RETURN NUMBER IS
    BEGIN
      INSERT INTO users (name) VALUES (p_name);
      RETURN 1;
    EXCEPTION
      WHEN DUP_VAL_ON_INDEX THEN
        RETURN 0;
    END;
  constructs: ["EXCEPTION", "unique_violation", "DUP_VAL_ON_INDEX"]
  tags: ["plsql", "exception", "p2o"]

- name: get_stacked_diagnostics_to_format_error
  category: p2o_plsql
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION safe_execute(p_sql TEXT)
    RETURNS TEXT AS $$
    DECLARE
      v_stack TEXT;
    BEGIN
      EXECUTE p_sql;
      RETURN 'OK';
    EXCEPTION
      WHEN OTHERS THEN
        GET STACKED DIAGNOSTICS v_stack = PG_EXCEPTION_CONTEXT;
        RETURN v_stack;
    END;
    $$ LANGUAGE plpgsql
  expected: >-
    CREATE OR REPLACE FUNCTION safe_execute(p_sql VARCHAR2)
    RETURN VARCHAR2 IS
    v_stack VARCHAR2(4000);
    BEGIN
      EXECUTE IMMEDIATE p_sql;
      RETURN 'OK';
    EXCEPTION
      WHEN OTHERS THEN
        v_stack := DBMS_UTILITY.FORMAT_ERROR_BACKTRACE;
        RETURN v_stack;
    END;
  constructs: ["GET_STACKED_DIAGNOSTICS", "FORMAT_ERROR_BACKTRACE"]
  tags: ["plsql", "exception", "diagnostics", "p2o"]

- name: for_rec_in_query_loop
  category: p2o_plsql
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION process_all()
    RETURNS VOID AS $$
    DECLARE
      rec RECORD;
    BEGIN
      FOR rec IN SELECT id, name FROM items LOOP
        RAISE NOTICE 'Processing: %', rec.name;
      END LOOP;
    END;
    $$ LANGUAGE plpgsql
  expected: >-
    CREATE OR REPLACE PROCEDURE process_all IS
    BEGIN
      FOR rec IN (SELECT id, name FROM items) LOOP
        DBMS_OUTPUT.PUT_LINE('Processing: ' || rec.name);
      END LOOP;
    END;
  constructs: ["FOR_IN_QUERY", "RECORD"]
  tags: ["plsql", "loop", "p2o"]
  acceptance_criteria:
    - "PG FOR rec IN query LOOP requires parentheses around query in Oracle"
    - "RECORD type is implicit in Oracle cursor FOR loop"

# ---------------------------------------------------------------------------
# ADDITIONAL PL/pgSQL CONVERSIONS
