- name: perform_to_select_null
  category: p2o_plsql
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION cleanup()
    RETURNS VOID AS $$
    BEGIN
      PERFORM delete_old_records();
    END;
    $$ LANGUAGE plpgsql
  expected: >-
    CREATE OR REPLACE PROCEDURE cleanup IS
    BEGIN
      delete_old_records();
    END;
  constructs: ["PERFORM"]
  tags: ["plsql", "p2o"]
  acceptance_criteria:
    - "PG PERFORM calls a function and discards result"
    - "Oracle just calls the procedure/function directly"

- name: found_to_sql_found
  category: p2o_plsql
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION update_if_exists(p_id INTEGER, p_name VARCHAR)
    RETURNS BOOLEAN AS $$
    BEGIN
      UPDATE users SET name = p_name WHERE id = p_id;
      RETURN FOUND;
    END;
    $$ LANGUAGE plpgsql
  expected: >-
    CREATE OR REPLACE FUNCTION update_if_exists(p_id NUMBER, p_name VARCHAR2)
    RETURN NUMBER IS
    BEGIN
      UPDATE users SET name = p_name WHERE id = p_id;
      IF SQL%FOUND THEN RETURN 1; ELSE RETURN 0; END IF;
    END;
  constructs: ["FOUND", "SQL%FOUND"]
  tags: ["plsql", "status", "p2o"]

- name: isnull_to_is_null
  category: p2o_plsql
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION check_null(val TEXT)
    RETURNS BOOLEAN AS $$
    BEGIN
      RETURN val IS NULL;
    END;
    $$ LANGUAGE plpgsql
  expected: >-
    CREATE OR REPLACE FUNCTION check_null(val VARCHAR2)
    RETURN NUMBER IS
    BEGIN
      IF val IS NULL THEN RETURN 1; ELSE RETURN 0; END IF;
    END;
  constructs: ["IS NULL", "BOOLEAN"]
  tags: ["plsql", "null", "p2o"]

- name: returning_in_plpgsql_to_returning_into
  category: p2o_plsql
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION insert_and_return(p_name VARCHAR)
    RETURNS INTEGER AS $$
    DECLARE
      v_id INTEGER;
    BEGIN
      INSERT INTO users (name) VALUES (p_name) RETURNING id INTO v_id;
      RETURN v_id;
    END;
    $$ LANGUAGE plpgsql
  expected: >-
    CREATE OR REPLACE FUNCTION insert_and_return(p_name VARCHAR2)
    RETURN NUMBER IS
    v_id NUMBER;
    BEGIN
      INSERT INTO users (name) VALUES (p_name) RETURNING id INTO v_id;
      RETURN v_id;
    END;
  constructs: ["RETURNING INTO"]
  tags: ["plsql", "returning", "p2o"]

- name: exception_no_data_found
  category: p2o_plsql
  direction: pg_to_oracle
  source: >-
    CREATE OR REPLACE FUNCTION safe_lookup(p_id INTEGER)
    RETURNS VARCHAR AS $$
    DECLARE
      v_name VARCHAR;
    BEGIN
      SELECT name INTO STRICT v_name FROM users WHERE id = p_id;
      RETURN v_name;
    EXCEPTION
      WHEN no_data_found THEN
        RETURN NULL;
    END;
    $$ LANGUAGE plpgsql
  expected: >-
    CREATE OR REPLACE FUNCTION safe_lookup(p_id NUMBER)
    RETURN VARCHAR2 IS
    v_name VARCHAR2(4000);
    BEGIN
      SELECT name INTO v_name FROM users WHERE id = p_id;
      RETURN v_name;
    EXCEPTION
      WHEN NO_DATA_FOUND THEN
        RETURN NULL;
    END;
  constructs: ["EXCEPTION", "no_data_found"]
  tags: ["plsql", "exception", "p2o"]
