# ---------------------------------------------------------------------------
# MIXED & EDGE CASES
# ---------------------------------------------------------------------------

- name: mixed_numeric_types_table
  category: p2o_data_types
  direction: pg_to_oracle
  source: >-
    CREATE TABLE measurements (
      id SERIAL PRIMARY KEY,
      sensor_id INTEGER NOT NULL,
      reading DOUBLE PRECISION,
      count BIGINT DEFAULT 0,
      factor REAL,
      total NUMERIC(15,4)
    )
  expected: >-
    CREATE TABLE measurements (
      id NUMBER(10) NOT NULL PRIMARY KEY,
      sensor_id NUMBER(10) NOT NULL,
      reading BINARY_DOUBLE,
      count NUMBER(19) DEFAULT 0,
      factor BINARY_FLOAT,
      total NUMBER(15,4)
    );
    CREATE SEQUENCE measurements_id_seq START WITH 1;
    CREATE OR REPLACE TRIGGER measurements_id_trg BEFORE INSERT ON measurements
    FOR EACH ROW BEGIN :NEW.id := measurements_id_seq.NEXTVAL; END;
  constructs: ["SERIAL", "INTEGER", "DOUBLE PRECISION", "BIGINT", "REAL", "NUMERIC"]
  tags: ["numeric", "mixed", "p2o"]

- name: numeric_negative_scale
  category: p2o_data_types
  direction: pg_to_oracle
  source: "CREATE TABLE t (rounded_val NUMERIC(10,-2))"
  expected: "CREATE TABLE t (rounded_val NUMBER(10,-2))"
  constructs: ["NUMERIC"]
  tags: ["numeric", "edge_case", "p2o"]

- name: money_to_number
  category: p2o_data_types
  direction: pg_to_oracle
  source: "CREATE TABLE t (amount MONEY)"
  expected: "CREATE TABLE t (amount NUMBER(19,4))"
  constructs: ["MONEY"]
  tags: ["numeric", "p2o"]
  acceptance_criteria:
    - "PG MONEY type has no Oracle equivalent"
    - "NUMBER(19,4) provides sufficient precision for monetary values"

- name: integer_array_to_nested_table
  category: p2o_data_types
  direction: pg_to_oracle
  source: "CREATE TABLE t (id INTEGER, scores INTEGER[])"
  expected: >-
    CREATE TABLE t (
      id NUMBER(10),
      scores SYS.ODCINUMBERLIST
    )
  constructs: ["INTEGER", "ARRAY"]
  tags: ["numeric", "array", "lossy", "p2o"]
  acceptance_criteria:
    - "PG integer arrays have no direct Oracle column-level equivalent"
    - "Use built-in SYS.ODCINUMBERLIST or define custom nested table type"
