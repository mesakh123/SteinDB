# ---------------------------------------------------------------------------
# SERIAL TYPES → SEQUENCE
# ---------------------------------------------------------------------------

- name: serial_to_number_sequence
  category: p2o_data_types
  direction: pg_to_oracle
  source: "CREATE TABLE t (id SERIAL PRIMARY KEY, name VARCHAR(100))"
  expected: >-
    CREATE TABLE t (id NUMBER(10) NOT NULL PRIMARY KEY, name VARCHAR2(100));
    CREATE SEQUENCE t_id_seq START WITH 1;
    CREATE OR REPLACE TRIGGER t_id_trg BEFORE INSERT ON t
    FOR EACH ROW BEGIN :NEW.id := t_id_seq.NEXTVAL; END;
  constructs: ["SERIAL"]
  tags: ["numeric", "sequence", "p2o"]

- name: bigserial_to_number_sequence
  category: p2o_data_types
  direction: pg_to_oracle
  source: "CREATE TABLE t (id BIGSERIAL PRIMARY KEY)"
  expected: >-
    CREATE TABLE t (id NUMBER(19) NOT NULL PRIMARY KEY);
    CREATE SEQUENCE t_id_seq START WITH 1;
    CREATE OR REPLACE TRIGGER t_id_trg BEFORE INSERT ON t
    FOR EACH ROW BEGIN :NEW.id := t_id_seq.NEXTVAL; END;
  constructs: ["BIGSERIAL"]
  tags: ["numeric", "sequence", "p2o"]

