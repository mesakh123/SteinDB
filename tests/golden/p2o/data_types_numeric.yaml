# =============================================================================
# SteinDB Golden Tests — P2O Numeric Data Type Conversions
# PostgreSQL numeric types → Oracle NUMBER/BINARY_FLOAT/BINARY_DOUBLE
# =============================================================================

# ---------------------------------------------------------------------------
# INTEGER TYPES
# ---------------------------------------------------------------------------

- name: smallint_to_number5
  category: p2o_data_types
  direction: pg_to_oracle
  source: "CREATE TABLE t (val SMALLINT)"
  expected: "CREATE TABLE t (val NUMBER(5))"
  constructs: ["SMALLINT"]
  tags: ["numeric", "p2o"]

- name: integer_to_number10
  category: p2o_data_types
  direction: pg_to_oracle
  source: "CREATE TABLE t (id INTEGER)"
  expected: "CREATE TABLE t (id NUMBER(10))"
  constructs: ["INTEGER"]
  tags: ["numeric", "p2o"]

- name: bigint_to_number19
  category: p2o_data_types
  direction: pg_to_oracle
  source: "CREATE TABLE t (big_id BIGINT)"
  expected: "CREATE TABLE t (big_id NUMBER(19))"
  constructs: ["BIGINT"]
  tags: ["numeric", "p2o"]

