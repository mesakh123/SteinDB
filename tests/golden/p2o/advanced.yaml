# =============================================================================
# SteinDB Golden Tests — P2O Advanced Patterns
# PostgreSQL-to-Oracle reverse mappings flagged by reviewers
# =============================================================================

# ---------------------------------------------------------------------------
# JSONB with GIN index → CLOB + function-based index
# ---------------------------------------------------------------------------

- name: jsonb_gin_index_to_fbi
  category: p2o_advanced
  direction: pg_to_oracle
  source: >-
    CREATE TABLE products (id SERIAL PRIMARY KEY, attrs JSONB);
    CREATE INDEX idx_products_attrs ON products USING GIN (attrs);
  expected: >-
    CREATE TABLE products (
      id NUMBER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
      attrs CLOB CHECK (attrs IS JSON)
    );
    CREATE INDEX idx_products_attrs ON products (JSON_VALUE(attrs, '$.name'))
  complexity: 7
  constructs: ["JSONB", "GIN", "SERIAL"]
  tags: ["p2o", "json", "index", "reviewer_gap"]
  acceptance_criteria:
    - "JSONB maps to CLOB with IS JSON check"
    - "GIN index has no direct Oracle equivalent; use function-based index"
    - "Must know which JSON paths to index (LLM may be required)"

# ---------------------------------------------------------------------------
# Array column with operations → nested table + TABLE()
# ---------------------------------------------------------------------------

- name: array_operations_to_nested_table
  category: p2o_advanced
  direction: pg_to_oracle
  source: >-
    SELECT id, tag FROM posts, unnest(tags) AS tag
    WHERE 'urgent' = ANY(tags)
  expected: >-
    SELECT p.id, t.COLUMN_VALUE AS tag
    FROM posts p, TABLE(p.tags) t
    WHERE 'urgent' IN (SELECT COLUMN_VALUE FROM TABLE(p.tags))
  complexity: 7
  constructs: ["ARRAY", "unnest", "ANY"]
  tags: ["p2o", "collections", "reviewer_gap"]
  acceptance_criteria:
    - "PG unnest() maps to Oracle TABLE() operator"
    - "ANY(array) maps to IN (SELECT COLUMN_VALUE FROM TABLE(...))"

# ---------------------------------------------------------------------------
# Table inheritance → manual restructure (LLM-required)
# ---------------------------------------------------------------------------

- name: table_inheritance_to_manual
  category: p2o_advanced
  direction: pg_to_oracle
  source: >-
    CREATE TABLE vehicles (id SERIAL PRIMARY KEY, make VARCHAR(50));
    CREATE TABLE cars (num_doors INTEGER) INHERITS (vehicles);
    CREATE TABLE trucks (payload_tons NUMERIC) INHERITS (vehicles);
  expected: >-
    CREATE TABLE vehicles (
      id NUMBER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
      make VARCHAR2(50),
      vehicle_type VARCHAR2(20)
    );
    CREATE TABLE cars (
      id NUMBER PRIMARY KEY REFERENCES vehicles(id),
      num_doors NUMBER(10)
    );
    CREATE TABLE trucks (
      id NUMBER PRIMARY KEY REFERENCES vehicles(id),
      payload_tons NUMBER
    )
  complexity: 10
  constructs: ["INHERITS", "SERIAL"]
  tags: ["p2o", "inheritance", "llm_required", "reviewer_gap"]
  acceptance_criteria:
    - "PG table inheritance has no Oracle equivalent"
    - "Convert to table-per-type with foreign keys"
    - "May require LLM for complex inheritance hierarchies"

# ---------------------------------------------------------------------------
# GENERATED ALWAYS AS IDENTITY → SEQUENCE + TRIGGER
# ---------------------------------------------------------------------------

- name: identity_to_sequence_trigger
  category: p2o_advanced
  direction: pg_to_oracle
  source: "CREATE TABLE t (id INTEGER GENERATED ALWAYS AS IDENTITY, name VARCHAR(100))"
  expected: >-
    CREATE TABLE t (id NUMBER(10) NOT NULL, name VARCHAR2(100));
    CREATE SEQUENCE t_id_seq START WITH 1;
    CREATE OR REPLACE TRIGGER t_id_trg BEFORE INSERT ON t
    FOR EACH ROW BEGIN :NEW.id := t_id_seq.NEXTVAL; END;
  complexity: 5
  constructs: ["IDENTITY", "GENERATED ALWAYS"]
  tags: ["p2o", "sequence", "reviewer_gap"]
  acceptance_criteria:
    - "PG GENERATED ALWAYS AS IDENTITY maps to Oracle SEQUENCE + TRIGGER"
    - "Oracle 12c+ supports GENERATED AS IDENTITY natively"
    - "Pre-12c requires sequence + trigger pattern"

# ---------------------------------------------------------------------------
# DISTINCT ON → KEEP(DENSE_RANK)
# ---------------------------------------------------------------------------

- name: distinct_on_to_keep
  category: p2o_advanced
  direction: pg_to_oracle
  source: >-
    SELECT DISTINCT ON (department_id) department_id, employee_name, salary
    FROM employees ORDER BY department_id, salary DESC
  expected: >-
    SELECT department_id,
      MAX(employee_name) KEEP (DENSE_RANK FIRST ORDER BY salary DESC) AS employee_name,
      MAX(salary) AS salary
    FROM employees GROUP BY department_id
  complexity: 7
  constructs: ["DISTINCT ON"]
  tags: ["p2o", "analytic", "reviewer_gap"]
  acceptance_criteria:
    - "PG DISTINCT ON has no direct Oracle equivalent"
    - "Oracle KEEP(DENSE_RANK FIRST/LAST) achieves same result"

# ---------------------------------------------------------------------------
# ON CONFLICT DO UPDATE → MERGE INTO
# ---------------------------------------------------------------------------

- name: on_conflict_to_merge
  category: p2o_advanced
  direction: pg_to_oracle
  source: >-
    INSERT INTO inventory (sku, qty)
    VALUES ('ABC', 10)
    ON CONFLICT (sku) DO UPDATE SET qty = inventory.qty + EXCLUDED.qty
  expected: >-
    MERGE INTO inventory tgt
    USING (SELECT 'ABC' AS sku, 10 AS qty FROM DUAL) src
    ON (tgt.sku = src.sku)
    WHEN MATCHED THEN UPDATE SET tgt.qty = tgt.qty + src.qty
    WHEN NOT MATCHED THEN INSERT (sku, qty) VALUES (src.sku, src.qty)
  complexity: 6
  constructs: ["ON CONFLICT", "EXCLUDED"]
  tags: ["p2o", "upsert", "reviewer_gap"]
  acceptance_criteria:
    - "PG ON CONFLICT (upsert) maps to Oracle MERGE INTO"
    - "EXCLUDED pseudo-table maps to source alias"

# ---------------------------------------------------------------------------
# FILTER (WHERE) on aggregate → CASE WHEN
# ---------------------------------------------------------------------------

- name: filter_where_to_case
  category: p2o_advanced
  direction: pg_to_oracle
  source: >-
    SELECT department_id,
      COUNT(*) FILTER (WHERE status = 'active') AS active_count,
      SUM(salary) FILTER (WHERE hire_date > DATE '2024-01-01') AS recent_salary
    FROM employees GROUP BY department_id
  expected: >-
    SELECT department_id,
      COUNT(CASE WHEN status = 'active' THEN 1 END) AS active_count,
      SUM(CASE WHEN hire_date > DATE '2024-01-01' THEN salary END) AS recent_salary
    FROM employees GROUP BY department_id
  complexity: 4
  constructs: ["FILTER", "WHERE"]
  tags: ["p2o", "aggregate", "reviewer_gap"]
  acceptance_criteria:
    - "PG FILTER (WHERE) on aggregates has no Oracle equivalent"
    - "Convert to CASE WHEN inside aggregate function"

# ---------------------------------------------------------------------------
# generate_series for dates → CONNECT BY LEVEL
# ---------------------------------------------------------------------------

- name: generate_series_dates_to_connect_by
  category: p2o_advanced
  direction: pg_to_oracle
  source: >-
    SELECT d::DATE AS report_date
    FROM generate_series('2024-01-01'::DATE, '2024-12-31'::DATE, '1 day'::INTERVAL) d
  expected: >-
    SELECT DATE '2024-01-01' + LEVEL - 1 AS report_date
    FROM DUAL
    CONNECT BY LEVEL <= DATE '2024-12-31' - DATE '2024-01-01' + 1
  complexity: 5
  constructs: ["generate_series", "INTERVAL"]
  tags: ["p2o", "series", "reviewer_gap"]
  acceptance_criteria:
    - "PG generate_series for dates maps to Oracle CONNECT BY LEVEL"
    - "Interval arithmetic differs between PG and Oracle"

# ---------------------------------------------------------------------------
# PG range types → two columns + CHECK
# ---------------------------------------------------------------------------

- name: range_type_to_columns
  category: p2o_advanced
  direction: pg_to_oracle
  source: >-
    CREATE TABLE reservations (
      id SERIAL PRIMARY KEY,
      room_id INTEGER,
      during TSRANGE,
      EXCLUDE USING GIST (room_id WITH =, during WITH &&)
    )
  expected: >-
    CREATE TABLE reservations (
      id NUMBER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
      room_id NUMBER(10),
      during_start TIMESTAMP,
      during_end TIMESTAMP,
      CONSTRAINT chk_during CHECK (during_start < during_end)
    )
  complexity: 8
  constructs: ["TSRANGE", "EXCLUDE", "GIST"]
  tags: ["p2o", "range_types", "reviewer_gap"]
  acceptance_criteria:
    - "PG range types have no Oracle equivalent"
    - "Split into start/end columns with CHECK constraint"
    - "EXCLUDE constraint requires application-level or trigger enforcement in Oracle"
