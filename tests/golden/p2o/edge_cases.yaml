- name: text_over_4000_to_clob
  category: p2o_edge_cases
  direction: pg_to_oracle
  source: "CREATE TABLE t (content TEXT)"
  expected: "CREATE TABLE t (content CLOB)"
  constructs: ["TEXT"]
  tags: ["edge_case", "lob", "p2o"]
