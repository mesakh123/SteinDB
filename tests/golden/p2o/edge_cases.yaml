  direction: pg_to_oracle
  source: "CREATE TABLE t (body VARCHAR(8000))"
  expected: "CREATE TABLE t (body CLOB)"
  constructs: ["VARCHAR"]
  tags: ["edge_case", "lob", "p2o"]
  acceptance_criteria:
    - "VARCHAR(>4000) exceeds Oracle VARCHAR2 limit"
    - "Must promote to CLOB"

