- name: on_conflict_to_merge
  category: p2o_edge_cases
  direction: pg_to_oracle
  source: >-
    INSERT INTO products (sku, name, price)
    VALUES ('W001', 'Widget', 9.99)
    ON CONFLICT (sku) DO UPDATE SET name = EXCLUDED.name, price = EXCLUDED.price
  expected: >-
    MERGE INTO products p
    USING (SELECT 'W001' AS sku, 'Widget' AS name, 9.99 AS price FROM DUAL) s
    ON (p.sku = s.sku)
    WHEN MATCHED THEN UPDATE SET p.name = s.name, p.price = s.price
    WHEN NOT MATCHED THEN INSERT (sku, name, price) VALUES (s.sku, s.name, s.price)
  complexity: 6
  constructs: ["ON CONFLICT", "UPSERT"]
  tags: ["edge_case", "dml", "p2o"]

