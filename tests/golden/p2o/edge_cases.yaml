# ---------------------------------------------------------------------------
# RECURSIVE CTE / CONNECT BY
# ---------------------------------------------------------------------------

- name: recursive_cte_to_connect_by
  category: p2o_edge_cases
  direction: pg_to_oracle
  source: >-
    WITH RECURSIVE tree AS (
      SELECT id, parent_id, name FROM categories WHERE parent_id IS NULL
      UNION ALL
      SELECT c.id, c.parent_id, c.name FROM categories c JOIN tree t ON c.parent_id = t.id
    )
    SELECT * FROM tree
  expected: >-
    SELECT id, parent_id, name FROM categories
    START WITH parent_id IS NULL
    CONNECT BY PRIOR id = parent_id
  complexity: 7
  constructs: ["WITH RECURSIVE", "CTE"]
  tags: ["edge_case", "recursive", "p2o"]

- name: recursive_cte_cycle_detection
  category: p2o_edge_cases
  direction: pg_to_oracle
  source: >-
    WITH RECURSIVE tree AS (
      SELECT id, parent_id, name, ARRAY[id] AS path FROM categories WHERE parent_id IS NULL
      UNION ALL
      SELECT c.id, c.parent_id, c.name, t.path || c.id
      FROM categories c JOIN tree t ON c.parent_id = t.id
      WHERE NOT c.id = ANY(t.path)
    )
    SELECT * FROM tree
  expected: >-
    SELECT id, parent_id, name, SYS_CONNECT_BY_PATH(id, '/') AS path
    FROM categories
    START WITH parent_id IS NULL
    CONNECT BY NOCYCLE PRIOR id = parent_id
  complexity: 8
  constructs: ["WITH RECURSIVE", "CYCLE_DETECTION"]
  tags: ["edge_case", "recursive", "p2o"]

