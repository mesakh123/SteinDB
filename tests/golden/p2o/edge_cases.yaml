# ---------------------------------------------------------------------------
# SERIAL / IDENTITY IN FK
# ---------------------------------------------------------------------------

- name: serial_fk_to_sequence_trigger
  category: p2o_edge_cases
  direction: pg_to_oracle
  source: >-
    CREATE TABLE orders (id SERIAL PRIMARY KEY, customer_id INTEGER);
    CREATE TABLE order_items (id SERIAL PRIMARY KEY, order_id INTEGER REFERENCES orders(id))
  expected: >-
    CREATE TABLE orders (id NUMBER(10) NOT NULL PRIMARY KEY, customer_id NUMBER(10));
    CREATE SEQUENCE orders_id_seq START WITH 1;
    CREATE OR REPLACE TRIGGER orders_id_trg BEFORE INSERT ON orders
    FOR EACH ROW BEGIN :NEW.id := orders_id_seq.NEXTVAL; END;
    CREATE TABLE order_items (id NUMBER(10) NOT NULL PRIMARY KEY, order_id NUMBER(10) REFERENCES orders(id));
    CREATE SEQUENCE order_items_id_seq START WITH 1;
    CREATE OR REPLACE TRIGGER order_items_id_trg BEFORE INSERT ON order_items
    FOR EACH ROW BEGIN :NEW.id := order_items_id_seq.NEXTVAL; END;
  complexity: 6
  constructs: ["SERIAL", "FK", "REFERENCES"]
  tags: ["edge_case", "serial", "p2o"]

