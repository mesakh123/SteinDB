# ---------------------------------------------------------------------------
# BOOLEAN HANDLING
# ---------------------------------------------------------------------------

- name: boolean_in_where_to_number1
  category: p2o_edge_cases
  direction: pg_to_oracle
  source: "SELECT * FROM users WHERE is_active"
  expected: "SELECT * FROM users WHERE is_active = 1"
  constructs: ["BOOLEAN"]
  tags: ["edge_case", "boolean", "p2o"]

- name: boolean_not_in_where
  category: p2o_edge_cases
  direction: pg_to_oracle
  source: "SELECT * FROM users WHERE NOT is_deleted"
  expected: "SELECT * FROM users WHERE is_deleted = 0"
  constructs: ["BOOLEAN", "NOT"]
  tags: ["edge_case", "boolean", "p2o"]

- name: boolean_case_expression
  category: p2o_edge_cases
  direction: pg_to_oracle
  source: >-
    SELECT name, CASE WHEN is_active THEN 'Yes' ELSE 'No' END AS status
    FROM users
  expected: >-
    SELECT name, CASE WHEN is_active = 1 THEN 'Yes' ELSE 'No' END AS status
    FROM users
  constructs: ["BOOLEAN", "CASE"]
  tags: ["edge_case", "boolean", "p2o"]

