- name: listen_notify_to_dbms_aq
  category: p2o_edge_cases
  direction: pg_to_oracle
  source: >-
    LISTEN order_events;
    NOTIFY order_events, 'new_order:1234'
  expected: >-
    /* LISTEN/NOTIFY maps to Oracle Advanced Queuing (DBMS_AQ) */
    /* LLM-required: full AQ setup depends on payload structure */
    EXEC DBMS_AQADM.CREATE_QUEUE_TABLE('order_events_qt', 'SYS.AQ$_JMS_TEXT_MESSAGE');
    EXEC DBMS_AQADM.CREATE_QUEUE('order_events', 'order_events_qt');
    EXEC DBMS_AQADM.START_QUEUE('order_events')
  complexity: 9
  constructs: ["LISTEN", "NOTIFY"]
  tags: ["edge_case", "llm_required", "messaging", "p2o"]

- name: row_level_security_to_vpd
  category: p2o_edge_cases
  direction: pg_to_oracle
  source: >-
    CREATE POLICY tenant_isolation ON orders
    FOR ALL TO app_user
    USING (tenant_id = current_setting('app.current_tenant')::INTEGER)
  expected: >-
    /* Row-Level Security maps to Oracle VPD (Virtual Private Database) */
    /* LLM-required: VPD policy function must be manually crafted */
    CREATE OR REPLACE FUNCTION tenant_policy(schema_name VARCHAR2, table_name VARCHAR2)
    RETURN VARCHAR2 IS
    BEGIN
      RETURN 'tenant_id = SYS_CONTEXT(''app_ctx'', ''current_tenant'')';
    END;
    /
    EXEC DBMS_RLS.ADD_POLICY('APP', 'ORDERS', 'TENANT_ISOLATION', 'APP', 'TENANT_POLICY')
  complexity: 9
  constructs: ["RLS", "POLICY"]
  tags: ["edge_case", "llm_required", "security", "p2o"]

- name: generated_column_to_virtual_column
  category: p2o_edge_cases
  direction: pg_to_oracle
  source: >-
    CREATE TABLE products (
      price NUMERIC(10,2),
      tax_rate NUMERIC(4,2),
      total_price NUMERIC(10,2) GENERATED ALWAYS AS (price * (1 + tax_rate)) STORED
    )
  expected: >-
    CREATE TABLE products (
      price NUMBER(10,2),
      tax_rate NUMBER(4,2),
      total_price NUMBER(10,2) GENERATED ALWAYS AS (price * (1 + tax_rate)) VIRTUAL
    )
  constructs: ["GENERATED ALWAYS AS", "STORED"]
  tags: ["edge_case", "generated_column", "p2o"]
  acceptance_criteria:
    - "PG STORED generated column maps to Oracle VIRTUAL column"
    - "Oracle virtual columns are not physically stored (unlike PG STORED)"

- name: exclusion_constraint_to_check_trigger
  category: p2o_edge_cases
  direction: pg_to_oracle
  source: >-
    CREATE TABLE reservations (
      room_id INTEGER,
      during TSTZRANGE,
      EXCLUDE USING GIST (room_id WITH =, during WITH &&)
    )
  expected: >-
    /* Exclusion constraints have no Oracle equivalent */
    /* LLM-required: implement as CHECK + BEFORE INSERT/UPDATE trigger */
    CREATE TABLE reservations (
      room_id NUMBER(10),
      during_start TIMESTAMP WITH TIME ZONE,
      during_end TIMESTAMP WITH TIME ZONE
    );
    CREATE OR REPLACE TRIGGER reservations_no_overlap
    BEFORE INSERT OR UPDATE ON reservations
    FOR EACH ROW
    DECLARE v_count NUMBER;
    BEGIN
      SELECT COUNT(*) INTO v_count FROM reservations
      WHERE room_id = :NEW.room_id
        AND during_start < :NEW.during_end
        AND during_end > :NEW.during_start;
      IF v_count > 0 THEN RAISE_APPLICATION_ERROR(-20001, 'Overlapping reservation'); END IF;
    END;
  complexity: 9
  constructs: ["EXCLUDE", "GIST", "TSTZRANGE"]
  tags: ["edge_case", "llm_required", "constraint", "p2o"]

