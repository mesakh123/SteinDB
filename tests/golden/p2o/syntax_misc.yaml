# ---------------------------------------------------------------------------
# UPSERT / MERGE
# ---------------------------------------------------------------------------

- name: on_conflict_do_update_to_merge
  category: p2o_syntax
  direction: pg_to_oracle
  source: >-
    INSERT INTO config (key, value)
    VALUES ('mode', 'dark')
    ON CONFLICT (key)
    DO UPDATE SET value = EXCLUDED.value
  expected: >-
    MERGE INTO config tgt
    USING (SELECT 'mode' AS key, 'dark' AS value FROM DUAL) src
    ON (tgt.key = src.key)
    WHEN MATCHED THEN UPDATE SET tgt.value = src.value
    WHEN NOT MATCHED THEN INSERT (key, value) VALUES (src.key, src.value)
  constructs: ["ON CONFLICT", "DO UPDATE"]
  tags: ["syntax", "upsert", "p2o"]

- name: on_conflict_do_nothing_to_merge_not_matched
  category: p2o_syntax
  direction: pg_to_oracle
  source: >-
    INSERT INTO users (email, name)
    VALUES ('a@b.com', 'Alice')
    ON CONFLICT (email) DO NOTHING
  expected: >-
    MERGE INTO users tgt
    USING (SELECT 'a@b.com' AS email, 'Alice' AS name FROM DUAL) src
    ON (tgt.email = src.email)
    WHEN NOT MATCHED THEN INSERT (email, name) VALUES (src.email, src.name)
  constructs: ["ON CONFLICT", "DO NOTHING"]
  tags: ["syntax", "upsert", "p2o"]

