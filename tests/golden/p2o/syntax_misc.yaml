# =============================================================================
# SteinDB Golden Tests — P2O Miscellaneous Syntax Conversions
# PostgreSQL SQL syntax → Oracle SQL syntax
# =============================================================================

# ---------------------------------------------------------------------------
# LIMIT / OFFSET
# ---------------------------------------------------------------------------

- name: limit_to_rownum
  category: p2o_syntax
  direction: pg_to_oracle
  source: "SELECT * FROM orders LIMIT 10"
  expected: "SELECT * FROM orders WHERE ROWNUM <= 10"
  constructs: ["LIMIT"]
  tags: ["syntax", "pagination", "p2o"]

- name: limit_offset_to_rownum_subquery
  category: p2o_syntax
  direction: pg_to_oracle
  source: "SELECT * FROM orders ORDER BY id LIMIT 10 OFFSET 20"
  expected: >-
    SELECT * FROM (
      SELECT a.*, ROWNUM rnum FROM (
        SELECT * FROM orders ORDER BY id
      ) a WHERE ROWNUM <= 30
    ) WHERE rnum > 20
  constructs: ["LIMIT", "OFFSET"]
  tags: ["syntax", "pagination", "p2o"]

# ---------------------------------------------------------------------------
# SET OPERATIONS
# ---------------------------------------------------------------------------

- name: except_to_minus
  category: p2o_syntax
  direction: pg_to_oracle
  source: >-
    SELECT id FROM all_users EXCEPT SELECT id FROM banned_users
  expected: >-
    SELECT id FROM all_users MINUS SELECT id FROM banned_users
  constructs: ["EXCEPT"]
  tags: ["syntax", "set_ops", "p2o"]

- name: except_all_to_minus_workaround
  category: p2o_syntax
  direction: pg_to_oracle
  source: >-
    SELECT id FROM table_a EXCEPT ALL SELECT id FROM table_b
  expected: >-
    SELECT id FROM (
      SELECT id, ROW_NUMBER() OVER (PARTITION BY id ORDER BY id) AS rn FROM table_a
    ) a WHERE NOT EXISTS (
      SELECT 1 FROM (
        SELECT id, ROW_NUMBER() OVER (PARTITION BY id ORDER BY id) AS rn FROM table_b
      ) b WHERE a.id = b.id AND a.rn = b.rn
    )
  constructs: ["EXCEPT ALL"]
  tags: ["syntax", "set_ops", "p2o"]
  acceptance_criteria:
    - "EXCEPT ALL preserves duplicates; Oracle MINUS does not"
    - "Requires ROW_NUMBER workaround to handle duplicate counting"

