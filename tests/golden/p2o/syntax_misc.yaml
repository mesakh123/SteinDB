- name: generate_series_to_connect_by
  category: p2o_syntax
  direction: pg_to_oracle
  source: "SELECT * FROM generate_series(1, 10)"
  expected: "SELECT LEVEL FROM DUAL CONNECT BY LEVEL <= 10"
