# =============================================================================
# SteinDB Golden Tests — P2O Syntax Conversions (Basic)
# PostgreSQL-to-Oracle reverse mappings for SQL syntax
# From issues.md Section 7 and Section 3
# =============================================================================

# ---------------------------------------------------------------------------
# JSONB → CLOB WITH JSON CHECK
# ---------------------------------------------------------------------------

- name: jsonb_to_clob_json
  category: p2o_syntax
  direction: pg_to_oracle
  source: "CREATE TABLE t (id SERIAL, metadata JSONB)"
  expected: >-
    CREATE TABLE t (
      id NUMBER GENERATED BY DEFAULT AS IDENTITY,
      metadata CLOB CHECK (metadata IS JSON)
    )
  complexity: 5
  constructs: ["JSONB", "SERIAL"]
  tags: ["p2o", "json", "section7"]
  acceptance_criteria:
    - "JSONB maps to CLOB with IS JSON check constraint"
    - "Oracle JSON support differs from PG JSONB indexing"
    - "GIN indexes on JSONB have no direct Oracle equivalent"

# ---------------------------------------------------------------------------
# ARRAY COLUMN → NESTED TABLE / VARRAY
# ---------------------------------------------------------------------------

- name: array_column_to_nested_table
  category: p2o_syntax
  direction: pg_to_oracle
  source: "CREATE TABLE t (id INTEGER, tags TEXT[])"
  expected: >-
    CREATE TABLE t (
      id NUMBER(10),
      tags SYS.ODCIVARCHAR2LIST
    )
  complexity: 6
  constructs: ["ARRAY", "TEXT"]
  tags: ["p2o", "collections", "section7"]
  acceptance_criteria:
    - "PG arrays have no direct Oracle column-level equivalent"
    - "Use built-in SYS.ODCIVARCHAR2LIST or define custom VARRAY/nested table"

# ---------------------------------------------------------------------------
# LATERAL JOIN → CORRELATED SUBQUERY
# ---------------------------------------------------------------------------

- name: lateral_join_to_correlated_subquery
  category: p2o_syntax
  direction: pg_to_oracle
  source: >-
    SELECT d.name, e.top_salary
    FROM departments d,
    LATERAL (SELECT MAX(salary) AS top_salary FROM employees WHERE department_id = d.id) e
  expected: >-
    SELECT d.name, (SELECT MAX(salary) FROM employees WHERE department_id = d.id) AS top_salary
    FROM departments d
  complexity: 6
  constructs: ["LATERAL_JOIN"]
  tags: ["p2o", "joins", "section7"]
  acceptance_criteria:
    - "Oracle 12c+ supports LATERAL but older versions do not"
    - "Correlated subquery is the safest cross-version equivalent"

# ---------------------------------------------------------------------------
# INSERT ON CONFLICT → MERGE INTO
# ---------------------------------------------------------------------------

- name: insert_on_conflict_to_merge
  category: p2o_syntax
  direction: pg_to_oracle
  source: >-
    INSERT INTO settings (key, value)
    VALUES ('theme', 'dark')
    ON CONFLICT (key)
    DO UPDATE SET value = EXCLUDED.value
  expected: >-
    MERGE INTO settings tgt
    USING (SELECT 'theme' AS key, 'dark' AS value FROM DUAL) src
    ON (tgt.key = src.key)
    WHEN MATCHED THEN UPDATE SET tgt.value = src.value
    WHEN NOT MATCHED THEN INSERT (key, value) VALUES (src.key, src.value)
  complexity: 6
  constructs: ["INSERT_ON_CONFLICT", "MERGE_INTO"]
  tags: ["p2o", "upsert", "section3"]
  acceptance_criteria:
    - "PG INSERT ... ON CONFLICT maps to Oracle MERGE INTO"
    - "EXCLUDED keyword maps to source alias in MERGE"

# ---------------------------------------------------------------------------
# RETURNING * (BULK) → RETURNING INTO (RESTRICTED)
# ---------------------------------------------------------------------------

- name: returning_star_to_returning_into
  category: p2o_syntax
  direction: pg_to_oracle
  source: "INSERT INTO orders (product, qty) VALUES ('Widget', 5) RETURNING *"
  expected: >-
    INSERT INTO orders (product, qty) VALUES ('Widget', 5)
    RETURNING id, product, qty INTO v_id, v_product, v_qty
  complexity: 5
  constructs: ["RETURNING"]
  tags: ["p2o", "returning", "section7"]
  acceptance_criteria:
    - "PG allows RETURNING * for bulk inserts inline"
    - "Oracle RETURNING INTO is more restrictive"
    - "Must specify columns and INTO variables explicitly"

# ---------------------------------------------------------------------------
# generate_series → CONNECT BY LEVEL
# ---------------------------------------------------------------------------

- name: generate_series_to_connect_by
  category: p2o_syntax
  direction: pg_to_oracle
  source: "SELECT generate_series(1, 10) AS n"
  expected: "SELECT LEVEL AS n FROM DUAL CONNECT BY LEVEL <= 10"
  complexity: 4
  constructs: ["GENERATE_SERIES", "CONNECT_BY"]
  tags: ["p2o", "row_generation", "section3"]
  acceptance_criteria:
    - "generate_series is PG-specific set-returning function"
    - "Oracle equivalent: CONNECT BY LEVEL for simple ranges"

# ---------------------------------------------------------------------------
# WITH RECURSIVE → CONNECT BY (simple cases)
# ---------------------------------------------------------------------------

- name: recursive_cte_to_connect_by
  category: p2o_syntax
  direction: pg_to_oracle
  source: >-
    WITH RECURSIVE org AS (
      SELECT id, name, manager_id, 1 AS level
      FROM employees WHERE manager_id IS NULL
      UNION ALL
      SELECT e.id, e.name, e.manager_id, o.level + 1
      FROM employees e JOIN org o ON e.manager_id = o.id
    )
    SELECT * FROM org
  expected: >-
    SELECT id, name, manager_id, LEVEL
    FROM employees
    START WITH manager_id IS NULL
    CONNECT BY PRIOR id = manager_id
  complexity: 7
  constructs: ["WITH_RECURSIVE", "CONNECT_BY", "START_WITH"]
  tags: ["p2o", "hierarchical", "section3"]
  acceptance_criteria:
    - "Simple tree traversal maps cleanly from WITH RECURSIVE to CONNECT BY"
    - "Complex CTEs with multiple UNIONs may need different approach"

# ---------------------------------------------------------------------------
# BOOLEAN WHERE is_active → WHERE is_active = 1
# ---------------------------------------------------------------------------

- name: boolean_predicate_to_number_check
  category: p2o_syntax
  direction: pg_to_oracle
  source: "SELECT * FROM users WHERE is_active"
  expected: "SELECT * FROM users WHERE is_active = 1"
  complexity: 3
  constructs: ["BOOLEAN"]
  tags: ["p2o", "boolean", "section1"]
  acceptance_criteria:
    - "PG allows bare boolean in WHERE clause"
    - "Oracle (pre-23c) has no column BOOLEAN; uses NUMBER(1)"
    - "Must rewrite WHERE is_active to WHERE is_active = 1"

- name: boolean_negation_to_number_check
  category: p2o_syntax
  direction: pg_to_oracle
  source: "SELECT * FROM users WHERE NOT is_deleted"
  expected: "SELECT * FROM users WHERE is_deleted = 0"
  complexity: 3
  constructs: ["BOOLEAN"]
  tags: ["p2o", "boolean", "section1"]
  acceptance_criteria:
    - "NOT is_deleted becomes is_deleted = 0 for Oracle NUMBER(1)"
