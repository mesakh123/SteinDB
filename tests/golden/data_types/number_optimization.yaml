# ---------------------------------------------------------------------------
# BOOLEAN: NUMBER(1,0) used as boolean flag
# ---------------------------------------------------------------------------

- name: number_1_0_boolean_flag
  category: data_types
  oracle: "CREATE TABLE t (is_active NUMBER(1,0))"
  expected_postgresql: "CREATE TABLE t (is_active BOOLEAN)"
  constructs: ["NUMBER"]
  tags: ["boolean_optimization"]
  complexity: 2
  acceptance_criteria:
    - "NUMBER(1,0) named with boolean-like prefix (is_, has_, can_) should map to BOOLEAN"

- name: number_1_0_boolean_flag_has
  category: data_types
  oracle: "CREATE TABLE t (has_access NUMBER(1,0))"
  expected_postgresql: "CREATE TABLE t (has_access BOOLEAN)"
  constructs: ["NUMBER"]
  tags: ["boolean_optimization"]
  complexity: 2

# ---------------------------------------------------------------------------
# MULTI-COLUMN: multiple NUMBER columns in one CREATE TABLE
# ---------------------------------------------------------------------------

- name: multi_number_columns
  category: data_types
  oracle: "CREATE TABLE t (id NUMBER(9), status NUMBER(2), amount NUMBER(10,2), big_ref NUMBER(18), flag NUMBER(1,0))"
  expected_postgresql: "CREATE TABLE t (id INTEGER, status SMALLINT, amount NUMERIC(10,2), big_ref BIGINT, flag BOOLEAN)"
  constructs: ["NUMBER"]
  tags: ["integer_optimization", "multi_column"]
  complexity: 3
