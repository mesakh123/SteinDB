# =============================================================================
# SteinDB Golden Tests — NUMBER Integer Optimization
# CYBERTEC rules: NUMBER(1-4,0)→SMALLINT, (5-9,0)→INTEGER,
#   (10-18,0)→BIGINT, (19+,0)→NUMERIC, (p,s>0)→NUMERIC(p,s)
# =============================================================================

# ---------------------------------------------------------------------------
# SMALLINT: NUMBER(1-4, 0)
# ---------------------------------------------------------------------------

- name: number_1_to_smallint
  category: data_types
  oracle: "CREATE TABLE t (flag NUMBER(1))"
  expected_postgresql: "CREATE TABLE t (flag SMALLINT)"
  constructs: ["NUMBER"]
  tags: ["integer_optimization", "smallint"]

- name: number_2_to_smallint
  category: data_types
  oracle: "CREATE TABLE t (priority NUMBER(2))"
  expected_postgresql: "CREATE TABLE t (priority SMALLINT)"
  constructs: ["NUMBER"]
  tags: ["integer_optimization", "smallint"]

- name: number_3_to_smallint
