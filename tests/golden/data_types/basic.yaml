# =============================================================================
# SteinDB Golden Tests — Data Type Conversions (Basic)
# Complete coverage of all 23+ Oracle data types per CYBERTEC guide
# =============================================================================

# ---------------------------------------------------------------------------
# STRING TYPES
# ---------------------------------------------------------------------------

- name: char_to_char
  category: data_types
  oracle: "CREATE TABLE t (code CHAR(10))"
  expected_postgresql: "CREATE TABLE t (code CHAR(10))"
  constructs: ["CHAR"]
  tags: ["string"]

- name: nchar_to_char
  category: data_types
  oracle: "CREATE TABLE t (code NCHAR(10))"
  expected_postgresql: "CREATE TABLE t (code CHAR(10))"
  constructs: ["NCHAR"]
  tags: ["string", "unicode"]

- name: varchar_to_varchar
  category: data_types
  oracle: "CREATE TABLE t (name VARCHAR(100))"
  expected_postgresql: "CREATE TABLE t (name VARCHAR(100))"
  constructs: ["VARCHAR"]
  tags: ["string"]

- name: varchar2_to_varchar
  category: data_types
  oracle: "CREATE TABLE t (name VARCHAR2(100))"
  expected_postgresql: "CREATE TABLE t (name VARCHAR(100))"
  constructs: ["VARCHAR2"]
  tags: ["string"]

- name: nvarchar2_to_varchar
  category: data_types
  oracle: "CREATE TABLE t (name NVARCHAR2(200))"
  expected_postgresql: "CREATE TABLE t (name VARCHAR(200))"
  constructs: ["NVARCHAR2"]
  tags: ["string", "unicode"]

- name: clob_to_text
  category: data_types
  oracle: "CREATE TABLE t (content CLOB)"
  expected_postgresql: "CREATE TABLE t (content TEXT)"
  constructs: ["CLOB"]
  tags: ["string", "lob"]

- name: long_to_text
  category: data_types
  oracle: "CREATE TABLE t (description LONG)"
  expected_postgresql: "CREATE TABLE t (description TEXT)"
  constructs: ["LONG"]
  tags: ["string", "deprecated"]

